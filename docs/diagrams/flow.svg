<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="flowTitle flowDesc" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title id="flowTitle">Settlepay payment flow</title>
  <desc id="flowDesc">Six-step flow from invoice creation to confirmed on-chain payment. Funds move directly from client wallet to workspace payout wallet; Settlepay reads chain only.</desc>

  <style><![CDATA[
    :root {
      --bg: #ffffff;
      --bg-subtle: #f8fafc;
      --line: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --card: #ffffff;
      --card-stroke: #e2e8f0;
      --brand: #0d9488;
      --brand-soft: #ccfbf1;
      --brand-mid: #5eead4;
      --on-chain: #f59e0b;
      --on-chain-soft: #fef3c7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --bg-subtle: #0f172a;
        --line: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --card: #0f172a;
        --card-stroke: #1e293b;
        --brand: #2dd4bf;
        --brand-soft: rgba(13,148,136,0.18);
        --brand-mid: #14b8a6;
        --on-chain: #f59e0b;
        --on-chain-soft: rgba(245,158,11,0.18);
      }
    }
    .bg          { fill: var(--bg); }
    .card        { fill: var(--card); stroke: var(--card-stroke); stroke-width: 1.5; }
    .card-soft   { fill: var(--bg-subtle); stroke: var(--card-stroke); stroke-width: 1.5; }
    .text        { fill: var(--text); }
    .muted       { fill: var(--text-muted); }
    .brand       { fill: var(--brand); }
    .brand-fill  { fill: var(--brand); }
    .brand-soft  { fill: var(--brand-soft); }
    .arrow       { stroke: var(--text-muted); stroke-width: 1.75; fill: none; }
    .arrow-brand { stroke: var(--brand); stroke-width: 2; fill: none; }
    .chain-line  { stroke: var(--on-chain); stroke-width: 1.75; stroke-dasharray: 4 4; fill: none; opacity: 0.85; }
    .h2          { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
    .body        { font-size: 12px; font-weight: 400; }
    .badge       { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .num         { font-size: 13px; font-weight: 700; fill: #ffffff; }
  ]]></style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--text-muted)"/>
    </marker>
    <marker id="arrowhead-brand" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--brand)"/>
    </marker>
    <marker id="arrowhead-chain" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--on-chain)"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="560"/>

  <!-- Title -->
  <text class="badge brand" x="60" y="48">PAYMENT FLOW</text>
  <text class="text" x="60" y="74" font-size="20" font-weight="600" letter-spacing="-0.015em">From invoice to settled in under a minute</text>
  <text class="muted body" x="60" y="96">Funds move client → workspace payout wallet directly. Settlepay reads chain, never holds funds.</text>

  <!-- ─────── Row 1: 1 → 2 → 3 ─────── -->

  <!-- Node 1: Freelancer -->
  <g transform="translate(60, 150)">
    <rect class="card" width="280" height="140" rx="14"/>
    <circle class="brand-fill" cx="32" cy="32" r="14"/>
    <text class="num" x="32" y="36" text-anchor="middle">1</text>
    <text class="text h2" x="58" y="36">Freelancer / Workspace member</text>
    <text class="muted body" x="20" y="76">Creates invoice in dashboard:</text>
    <text class="text body" x="20" y="96" font-weight="500">$2,450 · Acme Corp · due May 24</text>
    <text class="muted body" x="20" y="118">Picks accepted chains + tokens</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <path class="arrow" d="M 340 220 L 410 220" marker-end="url(#arrowhead)"/>
  <text class="muted body" x="375" y="210" text-anchor="middle">creates</text>

  <!-- Node 2: Settle -->
  <g transform="translate(410, 150)">
    <rect class="card-soft" width="280" height="140" rx="14"/>
    <circle class="brand-fill" cx="32" cy="32" r="14"/>
    <text class="num" x="32" y="36" text-anchor="middle">2</text>
    <text class="text h2" x="58" y="36">Settlepay</text>
    <text class="muted body" x="20" y="76">Generates unique payment link:</text>
    <text class="text body" x="20" y="96" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">settlepay.pro/pay/inv_abc123</text>
    <text class="muted body" x="20" y="118">Snapshots workspace payout wallet</text>
  </g>

  <!-- Arrow 2 → 3 -->
  <path class="arrow" d="M 690 220 L 760 220" marker-end="url(#arrowhead)"/>
  <text class="muted body" x="725" y="210" text-anchor="middle">shares</text>

  <!-- Node 3: Email/Telegram -->
  <g transform="translate(760, 150)">
    <rect class="card" width="280" height="140" rx="14"/>
    <circle class="brand-fill" cx="32" cy="32" r="14"/>
    <text class="num" x="32" y="36" text-anchor="middle">3</text>
    <text class="text h2" x="58" y="36">Freelancer → Client</text>
    <text class="muted body" x="20" y="76">Sends link via:</text>
    <text class="text body" x="20" y="96" font-weight="500">Email · Telegram · anywhere</text>
    <text class="muted body" x="20" y="118">No KYC, no account for client</text>
  </g>

  <!-- Vertical arrow down to row 2 (right → left turn) -->
  <path class="arrow-brand" d="M 900 290 L 900 340 Q 900 360 880 360 L 320 360 Q 300 360 300 380 L 300 400" marker-end="url(#arrowhead-brand)"/>

  <!-- ─────── Row 2: 6 ← 5 ← 4 ─────── -->

  <!-- Node 4: Client -->
  <g transform="translate(760, 400)">
    <rect class="card" width="280" height="120" rx="14"/>
    <circle class="brand-fill" cx="32" cy="32" r="14"/>
    <text class="num" x="32" y="36" text-anchor="middle">4</text>
    <text class="text h2" x="58" y="36">Client</text>
    <text class="muted body" x="20" y="74">Opens link · connects wallet</text>
    <text class="text body" x="20" y="94" font-weight="500">Pays 2,450 USDC on Base</text>
  </g>

  <!-- On-chain dashed arrow 4 → listener -->
  <path class="chain-line" d="M 760 480 L 460 480" marker-end="url(#arrowhead-chain)"/>
  <g transform="translate(560, 462)">
    <rect rx="9" width="120" height="22" fill="var(--on-chain-soft)"/>
    <text class="badge" x="60" y="15" text-anchor="middle" fill="var(--on-chain)">on-chain transfer</text>
  </g>

  <!-- Node 5: Listener -->
  <g transform="translate(180, 400)">
    <rect class="card-soft" width="280" height="120" rx="14"/>
    <circle class="brand-fill" cx="32" cy="32" r="14"/>
    <text class="num" x="32" y="36" text-anchor="middle">5</text>
    <text class="text h2" x="58" y="36">Listener (PHP daemon)</text>
    <text class="muted body" x="20" y="74">eth_getLogs polls every 5–15s</text>
    <text class="text body" x="20" y="94" font-weight="500">Matches Transfer → invoice</text>
  </g>

  <!-- Arrow 5 → 6 -->
  <path class="arrow-brand" d="M 180 460 L 110 460" marker-end="url(#arrowhead-brand)"/>

  <!-- Node 6: Receipt -->
  <g transform="translate(-170, 400)">
    <rect class="card" x="230" width="280" height="120" rx="14"/>
    <circle class="brand-fill" cx="262" cy="32" r="14"/>
    <text class="num" x="262" y="36" text-anchor="middle">6</text>
    <text class="text h2" x="288" y="36">Paid — all members notified</text>
    <text class="muted body" x="250" y="74">Receipt PDF · email both ways</text>
    <text class="text body" x="250" y="94" font-weight="500">Webhooks fire · 0.5–1% fee accrues</text>
  </g>
</svg>
