<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="archTitle archDesc" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title id="archTitle">Settlepay production architecture</title>
  <desc id="archDesc">Three-layer architecture: browsers, Hetzner server (nginx, PHP-FPM, MariaDB, Redis, workers, listener watching invoice + platform wallets), external RPC providers reading from L2 chains. Workspace is the ownership scope; user is auth only.</desc>

  <style><![CDATA[
    :root {
      --bg: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --card: #ffffff;
      --card-stroke: #e2e8f0;
      --bg-server: #f8fafc;
      --bg-rpc: #fffbeb;
      --bg-rpc-stroke: #fde68a;
      --bg-browser: #f0fdfa;
      --bg-browser-stroke: #99f6e4;
      --brand: #0d9488;
      --brand-soft: #ccfbf1;
      --on-chain: #d97706;
      --user: #2563eb;
      --user-soft: #dbeafe;
      --proc: #7c3aed;
      --proc-soft: #ede9fe;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --line: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --card: #0f172a;
        --card-stroke: #1e293b;
        --bg-server: #0a1326;
        --bg-rpc: rgba(245,158,11,0.08);
        --bg-rpc-stroke: rgba(245,158,11,0.30);
        --bg-browser: rgba(13,148,136,0.10);
        --bg-browser-stroke: rgba(45,212,191,0.30);
        --brand: #2dd4bf;
        --brand-soft: rgba(13,148,136,0.18);
        --on-chain: #f59e0b;
        --user: #60a5fa;
        --user-soft: rgba(59,130,246,0.18);
        --proc: #a78bfa;
        --proc-soft: rgba(124,58,237,0.18);
      }
    }
    .bg            { fill: var(--bg); }
    .text          { fill: var(--text); }
    .muted         { fill: var(--text-muted); }
    .card          { fill: var(--card); stroke: var(--card-stroke); stroke-width: 1.5; }
    .lane-server   { fill: var(--bg-server); stroke: var(--card-stroke); stroke-width: 1.5; }
    .lane-rpc      { fill: var(--bg-rpc); stroke: var(--bg-rpc-stroke); stroke-width: 1.5; }
    .lane-browser  { fill: var(--bg-browser); stroke: var(--bg-browser-stroke); stroke-width: 1.5; }
    .h1            { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .h2            { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .h3            { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
    .body          { font-size: 12px; font-weight: 400; }
    .small         { font-size: 11px; font-weight: 400; }
    .mono          { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; }
    .arrow         { stroke: var(--text-muted); stroke-width: 1.5; fill: none; }
    .arrow-brand   { stroke: var(--brand); stroke-width: 2; fill: none; }
    .arrow-https   { stroke: var(--user); stroke-width: 1.75; fill: none; }
    .arrow-rpc     { stroke: var(--on-chain); stroke-width: 1.75; fill: none; stroke-dasharray: 5 4; }
    .pill-user     { fill: var(--user-soft); }
    .pill-user-tx  { fill: var(--user); }
    .pill-proc     { fill: var(--proc-soft); }
    .pill-proc-tx  { fill: var(--proc); }
    .pill-brand    { fill: var(--brand-soft); }
    .pill-brand-tx { fill: var(--brand); }
  ]]></style>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--text-muted)"/>
    </marker>
    <marker id="ah-https" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--user)"/>
    </marker>
    <marker id="ah-rpc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--on-chain)"/>
    </marker>
    <marker id="ah-brand" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--brand)"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="780"/>

  <!-- ─────── Title ─────── -->
  <text class="h1" x="60" y="44" fill="var(--brand)">ARCHITECTURE</text>
  <text class="text" x="60" y="72" font-size="22" font-weight="600" letter-spacing="-0.015em">Three layers, one server, no custody</text>
  <text class="muted small" x="60" y="92">Workspace owns invoices, payments, billing &amp; branding. User is auth only. Listener reads chain, never writes.</text>

  <!-- ─────── Layer 1: Browsers ─────── -->
  <g transform="translate(60, 120)">
    <rect class="lane-browser" width="1080" height="120" rx="16"/>
    <text class="h1" x="20" y="28" fill="var(--brand)">BROWSERS</text>

    <!-- Marketing Twig -->
    <g transform="translate(20, 44)">
      <rect class="card" width="320" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Marketing &amp; /docs</text>
      <text class="muted body" x="16" y="44">Twig · multilingual · SEO · Prism</text>
    </g>

    <!-- Public payment Twig+viem -->
    <g transform="translate(360, 44)">
      <rect class="card" width="340" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Public payment / billing page</text>
      <text class="muted body" x="16" y="44">Twig + viem · wagmi · RainbowKit</text>
    </g>

    <!-- Dashboard React SPA -->
    <g transform="translate(720, 44)">
      <rect class="card" width="340" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Dashboard (workspace-scoped)</text>
      <text class="muted body" x="16" y="44">React 18 · TS strict · Vite · session auth</text>
    </g>
  </g>

  <!-- HTTPS arrow down to server -->
  <path class="arrow-https" d="M 600 240 L 600 290" marker-end="url(#ah-https)"/>
  <g transform="translate(610, 260)">
    <rect rx="9" width="56" height="22" fill="var(--user-soft)"/>
    <text class="h1" x="28" y="15" text-anchor="middle" fill="var(--user)">HTTPS</text>
  </g>

  <!-- ─────── Layer 2: Hetzner server ─────── -->
  <g transform="translate(60, 300)">
    <rect class="lane-server" width="1080" height="320" rx="20"/>
    <text class="h1" x="24" y="32" fill="var(--text-muted)">HETZNER SERVER · UBUNTU 24.04 · aaPanel</text>

    <!-- nginx -->
    <g transform="translate(24, 56)">
      <rect class="card" width="200" height="240" rx="12"/>
      <text class="h2 text" x="20" y="32">nginx</text>
      <text class="muted body" x="20" y="54">aaPanel-managed</text>
      <text class="muted body" x="20" y="72">TLS · Cloudflare proxied</text>
      <line x1="20" x2="180" y1="92" y2="92" stroke="var(--card-stroke)" stroke-width="1"/>
      <text class="h1 muted" x="20" y="116">REVERSE PROXY</text>
      <text class="text body" x="20" y="138" font-weight="500">→ PHP-FPM (Symfony)</text>
      <text class="text body" x="20" y="158" font-weight="500">→ static /build/</text>
      <line x1="20" x2="180" y1="178" y2="178" stroke="var(--card-stroke)" stroke-width="1"/>
      <text class="h1 muted" x="20" y="200">RATE LIMITS</text>
      <text class="muted body" x="20" y="220">/api · /auth · /pay</text>
    </g>

    <!-- Symfony PHP-FPM -->
    <g transform="translate(244, 56)">
      <rect class="card" width="380" height="240" rx="12"/>
      <text class="h2 text" x="20" y="32">Symfony 7.1 · PHP 8.3</text>
      <text class="muted body" x="20" y="54">Twig · Doctrine · Messenger · Mailer · Security</text>
      <line x1="20" x2="360" y1="74" y2="74" stroke="var(--card-stroke)" stroke-width="1"/>
      <text class="h1 muted" x="20" y="98">RESPONSIBILITIES</text>
      <text class="text body" x="20" y="120" font-weight="500">Invoice CRUD · Auth · REST API</text>
      <text class="text body" x="20" y="140" font-weight="500">Webhooks · PDF · Email · Branding</text>
      <text class="text body" x="20" y="160" font-weight="500">Workspaces · Members · Invitations</text>
      <line x1="20" x2="360" y1="180" y2="180" stroke="var(--card-stroke)" stroke-width="1"/>
      <g transform="translate(20, 190)">
        <rect class="pill-brand" width="172" height="26" rx="13"/>
        <text class="h1 pill-brand-tx" x="86" y="17" text-anchor="middle">READS CHAIN ONLY</text>
      </g>
      <text class="muted body" x="200" y="207" font-style="italic">never signs tx</text>
    </g>

    <!-- MariaDB -->
    <g transform="translate(644, 56)">
      <rect class="card" width="200" height="116" rx="12"/>
      <text class="h2 text" x="20" y="32">MariaDB 10.11</text>
      <text class="muted body" x="20" y="54">utf8mb4 · InnoDB</text>
      <line x1="20" x2="180" y1="72" y2="72" stroke="var(--card-stroke)" stroke-width="1"/>
      <text class="text small mono" x="20" y="92">workspaces · invoices</text>
      <text class="text small mono" x="20" y="106">payments · billing_intents</text>
    </g>

    <!-- Redis -->
    <g transform="translate(644, 184)">
      <rect class="card" width="200" height="112" rx="12"/>
      <text class="h2 text" x="20" y="32">Redis 7</text>
      <text class="muted body" x="20" y="54">Cache · sessions · health</text>
      <text class="muted body" x="20" y="74">Rate-limit buckets</text>
      <text class="muted body" x="20" y="94">(Messenger queue: Doctrine)</text>
    </g>

    <!-- Workers + Listener -->
    <g transform="translate(864, 56)">
      <rect class="card" width="192" height="240" rx="12"/>
      <text class="h2 text" x="20" y="32">systemd units</text>
      <line x1="20" x2="172" y1="48" y2="48" stroke="var(--card-stroke)" stroke-width="1"/>

      <g transform="translate(20, 64)">
        <rect class="pill-proc" width="152" height="22" rx="11"/>
        <text class="h1 pill-proc-tx" x="76" y="15" text-anchor="middle">MESSENGER WORKER</text>
      </g>
      <text class="muted body" x="20" y="106">Async jobs:</text>
      <text class="text small" x="20" y="124">emails · webhook deliveries</text>
      <text class="text small" x="20" y="140">PDF render · invitations</text>

      <line x1="20" x2="172" y1="156" y2="156" stroke="var(--card-stroke)" stroke-width="1"/>

      <g transform="translate(20, 166)">
        <rect class="pill-brand" width="152" height="22" rx="11"/>
        <text class="h1 pill-brand-tx" x="76" y="15" text-anchor="middle">CHAIN LISTENER</text>
      </g>
      <text class="muted body" x="20" y="208">Polls eth_getLogs:</text>
      <text class="text small" x="20" y="226">invoice + platform wallet</text>
    </g>

    <!-- Internal connector arrows -->
    <path class="arrow" d="M 224 176 L 244 176" marker-end="url(#ah)"/>
    <path class="arrow" d="M 624 176 L 644 110" marker-end="url(#ah)"/>
    <path class="arrow" d="M 624 176 L 644 230" marker-end="url(#ah)"/>
    <!-- workers ↔ DB -->
    <path class="arrow-brand" d="M 864 176 Q 854 114 844 114" marker-end="url(#ah-brand)"/>
  </g>

  <!-- RPC arrow down to chain layer -->
  <path class="arrow-rpc" d="M 950 620 L 950 662" marker-end="url(#ah-rpc)"/>
  <g transform="translate(960, 630)">
    <rect rx="9" width="92" height="22" fill="var(--bg-rpc)" stroke="var(--bg-rpc-stroke)"/>
    <text class="h1" x="46" y="15" text-anchor="middle" fill="var(--on-chain)">JSON-RPC</text>
  </g>

  <!-- ─────── Layer 3: External RPC + L2 chains ─────── -->
  <g transform="translate(60, 670)">
    <rect class="lane-rpc" width="1080" height="86" rx="16"/>
    <text class="h1" x="24" y="32" fill="var(--on-chain)">EXTERNAL · ALCHEMY / QUICKNODE</text>
    <g transform="translate(290, 15)">
      <rect class="card" width="180" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Base · 8453</text>
      <text class="muted body" x="16" y="44">5 confirmations</text>
    </g>
    <g transform="translate(478, 15)">
      <rect class="card" width="180" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Polygon · 137</text>
      <text class="muted body" x="16" y="44">30 confirmations</text>
    </g>
    <g transform="translate(666, 15)">
      <rect class="card" width="180" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Arbitrum · 42161</text>
      <text class="muted body" x="16" y="44">5 confirmations</text>
    </g>
    <g transform="translate(854, 15)">
      <rect class="card" width="180" height="58" rx="10"/>
      <text class="h3 text" x="16" y="24">Optimism · 10</text>
      <text class="muted body" x="16" y="44">5 confirmations</text>
    </g>
  </g>
</svg>
