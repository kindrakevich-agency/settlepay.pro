security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: 'auto'

    providers:
        users_in_db:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api/v1/(?!public|auth|health)
            stateless: true
            provider: users_in_db
            custom_authenticators:
                - App\Security\ApiTokenAuthenticator

        main:
            lazy: true
            provider: users_in_db
            stateless: false

            form_login:
                login_path: auth_login
                check_path: auth_login
                default_target_path: dashboard_home
                username_parameter: email
                password_parameter: password
                csrf_parameter: _csrf_token
                enable_csrf: true

            logout:
                path: auth_logout
                target: marketing_home

            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000           # 30 days
                samesite: lax
                secure: auto

    access_control:
        - { path: ^/(en|uk|es)?/?(login|register|forgot-password|reset-password|verify-email)(/.*)?$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/public, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/health, roles: PUBLIC_ACCESS }
        - { path: ^/(en|uk|es)?/?(pricing|docs|privacy|terms|pay|agency)(/.*)?$, roles: PUBLIC_ACCESS }
        - { path: ^/(en|uk|es)/workspaces/accept(/.*)?$, roles: PUBLIC_ACCESS }
        - { path: ^/(en|uk|es)?/?$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/(en|uk|es)/(app|account)(/.*)?$, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
