framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true
    trusted_hosts: '%env(default::TRUSTED_HOSTS)%'

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    php_errors:
        log: true

    rate_limiter:
        # login_throttling on the firewall has its own auto-named limiter,
        # we don't define one here. These are the app-level limiters.
        public_invoice:
            policy: 'token_bucket'
            limit: 60
            rate: { interval: '1 minute', amount: 60 }
        password_reset_request:
            policy: 'sliding_window'
            limit: 5
            interval: '1 hour'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
