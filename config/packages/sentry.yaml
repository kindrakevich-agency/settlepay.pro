sentry:
    # SENTRY_DSN is empty in .env by default — leaving it unset means the
    # SDK is a no-op (no init, no overhead, no network calls). For prod
    # set the real DSN in /www/wwwroot/settlepay.pro/.env.local.
    dsn: '%env(SENTRY_DSN)%'
    options:
        environment: '%kernel.environment%'
        # Capture every error in dev for visibility while building; in prod
        # 100% is fine at our scale (1 invoice ≈ a handful of requests).
        traces_sample_rate: 1.0

# Filter noisy / non-actionable events as a tagged event listener so we
# get DI + can inject services later if needed. App\Service\Sentry\
# BeforeSendFilter is wired via the kernel.event_listener tag in
# config/services.yaml. (Sentry's options.before_send doesn't resolve
# Symfony service refs cleanly across 5.x minor versions, so we wire
# this side instead.)

# Wire Monolog so every $logger->error(...) lands in Sentry as well —
# the listener daemon and the messenger workers already use the logger,
# so this gives us coverage of background jobs for free.
when@prod:
    monolog:
        handlers:
            sentry:
                type: sentry
                level: error
                hub_id: Sentry\State\HubInterface
