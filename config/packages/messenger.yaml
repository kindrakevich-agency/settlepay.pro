framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 60000
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        # Routing is added per-message-class as they are created.
        # Until then, messages dispatch synchronously by default.
        # See CLAUDE.md §7 for the planned message classes.
        routing:
            App\Message\DeliverWebhookMessage: async
