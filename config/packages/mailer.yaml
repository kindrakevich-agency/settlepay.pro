framework:
    mailer:
        dsn: '%env(MAILER_DSN)%'
        # We deliberately do NOT set envelope.sender. Resend's bridge
        # uses $envelope->getSender() to populate the API "from" field,
        # which becomes the From header in the delivered email. If we
        # override envelope.sender to a bare address, the display name
        # gets stripped en route. By leaving it unset, Symfony's
        # DelayedEnvelope reads From directly from the Email object,
        # preserving the display name "Settlepay <hello@settlepay.pro>".
        # Resend overrides Return-Path with their own bounce-tracking
        # subdomain anyway, so envelope.sender wasn't needed.
        # AuthMailer + SendTestEmailCommand set From explicitly using
        # Mime\Address($MAILER_FROM_ADDRESS, $MAILER_FROM_NAME).
