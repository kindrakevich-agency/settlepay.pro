framework:
    mailer:
        dsn: '%env(MAILER_DSN)%'
        envelope:
            # SMTP envelope sender — must match a verified domain at the
            # provider (Resend). Bounces go here.
            sender: '%env(MAILER_FROM_ADDRESS)%'
        # No headers.From here — AuthMailer + SendTestEmailCommand attach
        # the From explicitly via Address(MAILER_FROM_ADDRESS, MAILER_FROM_NAME)
        # so the display name is unambiguous in every inbox.
