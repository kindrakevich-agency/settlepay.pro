parameters:
    locale: 'en'
    enabled_locales: ['en', 'uk', 'es']

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            $projectDir: '%kernel.project_dir%'
            $appEnv: '%kernel.environment%'
            $mailerFromAddress: '%env(MAILER_FROM_ADDRESS)%'
            $mailerFromName: '%env(MAILER_FROM_NAME)%'
            $googleClientId: '%env(string:GOOGLE_CLIENT_ID)%'
            $googleAuthEnabled: '%env(bool:GOOGLE_AUTH_ENABLED)%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
