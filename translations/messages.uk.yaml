        title: 'Питання про Agency'
        q1: 'Скільки місць я отримую?'
        a1: '10 місць загалом — це власник плюс 9 запрошених колег. Достатньо для студії 1–10 осіб. Без доплати за додаткові місця.'
        q2: 'Чи бачить учасник інвойси іншого учасника?'
        a2: 'Так. Кожен учасник робочого простору бачить кожен інвойс, кожен платіж, кожен лог вебхуків. Тариф Agency — для команд, що ВЖЕ довіряють одна одній спільний фінансовий пул.'
        q3: 'Чого учасник НЕ може?'
        a3: 'Учасники не змінюють тариф, виплати, бренд, API-токени й вебхуки. Можуть створювати, надсилати й скасовувати власні інвойси. Власник керує гаманцем і тарифом.'
