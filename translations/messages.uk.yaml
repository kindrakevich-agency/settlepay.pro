seo:
    default_description: 'Settlepay — це інструмент рівня Stripe для виставлення інвойсів у стейблкоїнах. Надсилай професійний інвойс і отримуй USDC у мережах Base, Polygon, Arbitrum чи Optimism — без кастоді, без банків, без чекання.'
    home:
        title: 'Settlepay — отримуй оплату в стейблкоїнах. Без банків. Без чекання.'
        description: 'Надсилай інвойси, отримуй USDC у найдешевших L2-мережах. Без кастоді, комісія від 0,5%, без KYC для клієнтів. Створено для фрілансерів з України, Аргентини, Бразилії, Нігерії та далі.'
        keywords: 'крипто інвойси, інвойси у стейблкоїнах, оплата USDC, оплата в крипті, фріланс крипто інвойс, Base USDC, без кастоді, settlepay'
        offer_description: 'Безкоштовно до $1 000 на місяць. Комісія 1% на безкоштовному плані, 0,5% на Pro.'

