    fees:
        title: 'Як працює комісія'
        body: 'У Free комісія — 1% з оплаченого інвойсу; у Pro — 0,5%. Комісії накопичуються протягом місяця, ми списуємо їх у фіаті з твоєї підписки 1-го числа (ніколи не з твоїх стейблкоїнів). Усе non-custodial — кошти йдуть напряму від клієнта тобі.'
        fineprint: 'Без плати за підключення, без мінімальної суми, скасуй у будь-який момент.'
    faq:
        title: 'Часті питання'
        q1: 'Чому комісія така низька порівняно з PayPal / Stripe?'
        a1: 'PayPal та Stripe — це глобальна платіжна інфраструктура (карти, ACH, антифрод, чарджбеки). Settlepay цього не робить — клієнт платить з гаманця тобі напряму, блокчейн розрахується сам. Ми лише зіставляємо платежі з інвойсами й сповіщаємо тебе. Більшість наших витрат — сервер, email, підтримка — на малих об’ємах це ~0,5% середнього інвойсу.'
        q2: 'Чи треба знатися на крипті?'
        a2: 'Ні. Налаштування забирає 5 хвилин: реєстрація, вставка адреси гаманця (з MetaMask, Coinbase Wallet тощо), перший інвойс. Клієнту теж не потрібен крипто-досвід — багато з них уже мають гаманець.'
        q3: 'А якщо клієнт ніколи не використовував крипту?'
        a3: 'Надішли йому <a href="https://github.com/kindrakevich-agency/settlepay.pro/blob/main/docs/CRYPTO_BASICS.md" class="text-brand-600 hover:underline">наш 5-хвилинний посібник</a>. Або хай купить USDC карткою через Coinbase / MoonPay / Transak — перший раз 10 хвилин, далі миттєво.'
        q4: 'Які мережі підтримуються?'
        a4: 'Base, Polygon, Arbitrum, Optimism — найдешевші EVM L2. Середній gas — $0,01-0,05 за платіж. Ethereum mainnet ми навмисно не підтримуємо — там $5-20 за транзакцію.'
        q5: 'Це легально? Чи треба KYC клієнтів?'
        a5: 'Settlepay — це софт, не money transmitter. Ми не зберігаємо коштів. Клієнт платить тобі напряму, peer-to-peer. Вимоги KYC залежать від податкового законодавства твоєї країни (так само, як для SWIFT-платежу). Ми самі KYC не вимагаємо. Звернися до бухгалтера щодо звітності з крипто-доходу.'
        q6: 'Як вивести в фіат?'
        a6: 'Ти отримуєш USDC у гаманець — той самий USDC можна виводити на банк через Coinbase, Binance, Kraken, MoonPay або локальні біржі. Перший раз — 1-3 дні (KYC), далі — хвилини. Або плати безпосередньо карткою Coinbase Card / Crypto.com Card.'
    cta:
        title: 'Готовий приймати оплату в стейблкоїнах?'

