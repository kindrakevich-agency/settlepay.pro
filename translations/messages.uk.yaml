privacy:
    title: Політика конфіденційності
    seo:
        title: 'Політика конфіденційності Settlepay'
        description: 'Які саме дані Settlepay збирає: акаунт, рахунки, адреси гаманців. Ми не зберігаємо коштів і не бачимо приватних ключів.'
    intro: 'Ця Політика простими словами пояснює, які дані Settlepay збирає, навіщо й як ми ними розпоряджаємось.'
    s1_title: '1. Що ми збираємо'
    s1_body: 'Коли ти створюєш акаунт і користуєшся Settlepay, ми збираємо:'
    s1_item_account_t: 'Дані акаунта'
    s1_item_account_d: 'Email, пароль (хешований Argon2id — у відкритому вигляді він не зберігається ніколи), назву бізнесу, за бажанням — податковий ID та адресу, валюту й мову за замовчуванням.'
    s1_item_invoice_t: 'Зміст рахунків'
    s1_item_invoice_d: 'Номер інвойсу, позиції, суми, ім’я та email клієнта, які ти ввів, термін оплати.'
    s1_item_wallet_t: 'Публічну адресу гаманця'
    s1_item_wallet_d: 'Адресу 0x..., яку ти зазначив як гаманець-отримувач. Це публічні дані з блокчейну; ми ніколи не запитуємо і не бачимо твого приватного ключа.'
    s1_item_logs_t: 'Серверні логи'
    s1_item_logs_d: 'Стандартні логи веб-доступу (IP, user-agent, шлях запиту) — для безпеки та боротьби зі зловживаннями. Зберігаються 30 днів.'
    s2_title: '2. Чого ми НЕ збираємо'
    s2_body: 'Settlepay свідомо НЕ збирає:'
    s2_item_1: '<strong>Твоїх приватних ключів.</strong> Ніколи. Settlepay не зберігає коштів — твій гаманець сам підписує всі транзакції, а ми технічно не маємо доступу до твоїх грошей.'
    s2_item_2: '<strong>Документів KYC.</strong> Ні паспорта, ні ID, ні селфі. Ми — програмний сервіс, не платіжний оператор.'
    s2_item_3: '<strong>Особистих даних твоїх клієнтів понад те, що ти сам вводиш у рахунок.</strong> Клієнт платить за публічним посиланням — ми не вимагаємо ані реєстрації, ані документів.'
    s3_title: '3. Сервіси третіх сторін'
    s3_body: 'Щоб Settlepay працював, ми користуємось такими сервісами — у кожного власна політика конфіденційності:'
    s3_cloudflare: 'CDN і захист від DDoS. Бачить IP-адресу кожного відвідувача.'
    s3_resend: 'Вихідна пошта. Бачить email-адреси й текст листів.'
    s3_hetzner: 'Хостинг сервера. Зберігає всю базу даних у зашифрованому вигляді.'
    s3_rpc: 'Читає події Transfer у блокчейні, щоб виявити твої платежі. Ми не передаємо їм твою адресу гаманця — фільтруємо логи за адресою токена.'
    s3_walletconnect: 'Підключення мобільних гаманців через QR-код. Бачить, який гаманець під’єднується, але не суму чи призначення платежу.'
    s3_chain_t: 'Сам блокчейн'
    s3_chain_d: 'Публічний за визначенням — будь-хто бачить, хто кому скільки заплатив. Ми до цього нічого не додаємо.'
    s4_title: '4. Як ми використовуємо твої дані'
    s4_body: 'Винятково для роботи сервісу: показати твій кабінет, надсилати листи про рахунки та квитанції, знаходити платежі в блокчейні й прив’язувати їх до рахунків. Ми не продаємо, не здаємо в оренду й не передаємо твоїх даних рекламодавцям. Ми не використовуємо аналітики, що стежить за тобою на інших сайтах.'
    s5_title: '5. Твої права'
    s5_body: 'Ти можеш:'
    s5_item_1: 'Експортувати всі дані свого акаунта за запитом (профіль, рахунки, платежі).'
    s5_item_2: 'Видалити акаунт назавжди. Записи про оплачені рахунки ми зберігаємо 7 років для податкового аудиту (вже без особистих даних).'
    s5_item_3: 'Виправити будь-яку інформацію самостійно в /app/settings.'
    s5_item_4: 'Звернутися до нас з будь-яким питанням щодо приватності.'
    s5_contact: 'З усіх цих питань пиши на <a href="mailto:hello@settlepay.pro">hello@settlepay.pro</a>.'
    s6_title: '6. Файли cookie'
    s6_body: 'Ми використовуємо одну-єдину cookie — сесійну, щоб тримати тебе авторизованим. Жодного відстеження, жодної реклами, жодних cookie з інших сайтів.'
    s7_title: '7. Діти'
    s7_body: 'Settlepay призначений для користувачів від 18 років. Ми свідомо не збираємо даних дітей.'
    s8_title: '8. Зміни в Політиці'
    s8_body: 'Коли ми оновлюємо цю Політику, ми змінюємо дату «Останнє оновлення» і надсилаємо лист усім власникам активних акаунтів. Про істотні зміни попереджаємо за 30 днів.'

terms:
    title: Умови користування
    seo:
        title: 'Умови користування Settlepay'
        description: 'Settlepay — програмний сервіс, а не платіжний оператор. Ми не зберігаємо коштів і нічого не переказуємо. Платежі в блокчейні незворотні. Використовуєш на свій ризик.'
    intro: 'Ці Умови регулюють користування Settlepay. Створюючи акаунт, ти погоджуєшся з ними.'
    s1_title: '1. Що таке Settlepay'
    s1_body: 'Settlepay — це <strong>програмний сервіс</strong>, який допомагає фрілансерам і невеликим бізнесам надсилати професійні рахунки та отримувати оплату в стейблкоїнах (USDC, USDT, DAI) у мережах, сумісних з Ethereum. Settlepay <strong>НЕ є</strong> платіжним оператором, кастодіаном, банком, біржею чи брокером. Ми не зберігаємо, не переказуємо й не маємо жодного доступу до коштів користувачів. Гроші йдуть напряму з гаманця клієнта до твого — через публічний блокчейн.'
    s2_title: '2. Хто може користуватися'
    s2_body: 'Ти маєш:'
    s2_item_1: 'Бути віком від 18 років.'
    s2_item_2: 'Не перебувати в санкційних списках (OFAC SDN, консолідованому списку ЄС, списках ООН тощо).'
    s2_item_3: 'Мати право користуватися таким сервісом за законами країни свого проживання.'
    s3_title: '3. Твої обов’язки'
    s3_body: 'Ти сам відповідаєш за: збереження своїх облікових даних; безпеку приватного ключа гаманця (у нас немає до нього доступу й ми не можемо його відновити); декларування та сплату податків з отриманого доходу; законність твоєї діяльності за місцевим правом; правдивість інформації, яку ти вказуєш у рахунках.'
    s4_title: '4. Реалії блокчейну'
    s4_body: 'Транзакції в криптовалюті <strong>незворотні</strong>. Щойно платіж підтверджено в блокчейні, ні Settlepay, ні будь-хто інший не може його скасувати, повернути чи відновити. Зокрема:'
    s4_item_1: 'Якщо ти вкажеш неправильну адресу гаманця-отримувача, кошти, надіслані туди, будуть втрачені — не з нашої вини, а через незмінність блокчейну.'
    s4_item_2: 'Якщо клієнт надішле не ту суму, це між вами двома. Settlepay фіксує розбіжність, але не вирішує суперечок.'
    s4_item_3: 'Якщо гаманець клієнта зламано і твій рахунок оплатив хтось інший — оплата все одно зараховується. Розслідування крадіжки — це між клієнтом і правоохоронними органами.'
    s4_item_4: 'Якщо емітент стейблкоїна (наприклад, Circle для USDC) заблокує гаманець, кошти будуть недоступні до моменту розблокування. Settlepay на це жодним чином не впливає.'
    s5_title: '5. Комісії'
    s5_body: 'Free: 1% з оплаченого рахунку. Pro: $19 USDC за 30 днів + 0,5% з оплаченого рахунку. Agency: $49 USDC за 30 днів + 0,5%, 10 місць. Усі суми — у USDC. Комісія за рахунок накопичується на твоєму акаунті, і ти сплачуєш її у USDC на платформенний гаманець Settlepay коли тобі зручно, зі сторінки «Тариф». Ми ніколи не списуємо автоматично, не зберігаємо твоїх коштів і не вираховуємо комісії з тих стейблкоїнів, які тобі надходять, — вони йдуть напряму з гаманця клієнта до тебе.'
    s6_title: '6. Допустиме використання'
    s6_body: 'Ти погоджуєшся не використовувати Settlepay для: незаконної діяльності (шахрайство, відмивання коштів, фінансування тероризму); прийому оплати за товари чи послуги, заборонені у твоїй юрисдикції; переслідування, наклепу чи зловживання через текст рахунку; надсилання рахунків клієнтам, які не погоджувалися на оплату; будь-яких спроб порушити роботу або зробити реверс-інжиніринг сервісу.'
    s7_title: '7. Припинення'
    s7_body: 'Будь-яка зі сторін може припинити користування в будь-який момент. Ми можемо призупинити або видалити твій акаунт, якщо ти порушиш ці Умови, не сплатиш накопичені комісії або потрапиш до санкційного списку. Припинення не скасовує вже накопичених комісій. Дані можна експортувати протягом 30 днів після припинення; після цього вони видаляються (з урахуванням законних вимог до зберігання).'
    s8_title: '8. Відмова від гарантій'
    s8_body: 'Settlepay надається «як є», без жодних гарантій. Ми не обіцяємо безперервної роботи, відсутності помилок або того, що конкретний блокчейн чи стейблкоїн існуватиме й надалі. Ми робимо все, що можемо, але вся базова інфраструктура — поза нашим контролем.'
    s9_title: '9. Обмеження відповідальності'
    s9_body: 'У межах, дозволених законом, загальна відповідальність Settlepay обмежена меншою з двох сум: (а) комісіями, які ти нам сплатив за останні 12 місяців до моменту претензії, або (б) $100. Ми не несемо відповідальності за збитки, спричинені перевантаженням мережі блокчейну, збоями RPC-провайдерів, втратою прив’язки стейблкоїна, помилками в смарт-контрактах токенів, заблокованими емітентом коштами чи будь-якими діями третіх сторін.'

