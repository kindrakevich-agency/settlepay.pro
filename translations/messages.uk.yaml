about:
    seo:
        title: 'Про Settlepay — навіщо існуємо і як працюємо'
        description: 'Settlepay — небанківський, неконтрольований інструмент для виставлення інвойсів. Фрилансери отримують оплату в стейблкоїнах у дешевих L2-мережах. Для тих, кого банки блокують, заморожують або хочуть 5% за SWIFT-переказ.'

    hero:
        eyebrow: Про нас
        title: 'Банки не створені для міжнародних фрилансерів.'
        sub: 'Settlepay — це те, чого нам бракувало, коли ми самі починали виставляти інвойси клієнтам за кордоном. Надішли посилання на оплату. Отримай USDC. Обійди банк. Без карткового процесора, без SWIFT, без заморожених рахунків.'
        cta_primary: 'Почати безкоштовно — менш ніж за хвилину'
        cta_secondary: 'Як це працює'

    problem:
        eyebrow: Проблема
        title: 'Міжнародне виставлення інвойсів зламане для більшості світу.'
        sub: 'Більшість сервісів для оплати фрилансерам вважає, що ти живеш у США або ЄС. Якщо ні — кожен крок це біль.'
        p1_title: 'SWIFT повільний і дорогий'
        p1_body: 'Міжнародний банківський переказ йде 3–7 робочих днів. Відправник платить $25–$50, отримувач втрачає ще $10–$30 на вході, плюс 1–3% курсового спреду. Інвойс на $500 часто доходить як $440 — через тиждень.'
        p2_title: 'Картки заблоковані для половини світу'
        p2_body: 'Stripe, PayPal і Wise не працюють в Україні, Нігерії, Аргентині, Пакистані, В’єтнамі та десятках інших країн, де живуть серйозні фрилансери. Саме ті країни, що дали світу бум віддаленої роботи, найбільше відрізані від платіжних рейок.'
        p3_title: 'Банки заморожують рахунки без попередження'
        p3_body: 'Переказ від нового клієнта тригерить перевірку на шахрайство. Рахунок блокують. Ти тижнями доводиш, що інвойс справжній — а оренда тим часом не платиться. У країнах, що розвиваються, з фрилансерами таке буває постійно.'
        p4_title: 'Комісії з’їдають 5–8% з кожного інвойсу'
        p4_body: 'Додай комісії за переказ + курсовий спред + картковий процесор + втрати на конверсії в локальну валюту — і типовий міжнародний фрилансер втрачає 5–8% з кожного долара ще до того, як він опиниться в кишені.'

    solution:
        eyebrow: 'Наше рішення'
        title: 'Стейблкоїни в дешевих L2-мережах.'
        body: 'Стейблкоїн — це токен, прив’язаний 1:1 до долара. USDC випускає Circle, повністю забезпечений резервами, можна обміняти на справжній долар. Ми не випускаємо токенів — ми використовуємо ті, яким уже довіряють мільйони людей. Платежі надходять за секунди в мережах Base, Polygon, Arbitrum і Optimism — Layer 2, де транзакція коштує близько одного цента.'
        bullet1: 'Кошти йдуть напряму з гаманця клієнта в твій. Settlepay ніколи не торкається грошей.'
        bullet2: 'Типовий платіж коштує $0,01–0,05 у комісіях мережі проти $40+ за SWIFT.'
        bullet3: 'Платежі приходять за 5–30 секунд, остаточно, незалежно від країни.'
        bullet4: 'USDC прив’язаний до долара — скільки клієнт надіслав, стільки ти й отримав, без курсових сюрпризів.'

    how:
        eyebrow: 'Як це працює'
        title: 'Від інвойсу до оплати за шість кроків.'
        sub: 'Весь процес побудований так, щоб ані ти, ані твій клієнт не мусили розбиратися в механіці блокчейну.'
        step1_title: 'Підключи гаманець для виплат'
        step1_body: 'Один раз встав адресу EVM-гаманця в Налаштуваннях. Та сама адреса працює у всіх чотирьох мережах. Якщо гаманця ще немає — встанови MetaMask або Coinbase Wallet. Обидва безкоштовні й налаштовуються за п’ять хвилин.'
        step2_title: 'Створи інвойс'
        step2_body: 'Додай суму, email клієнта, позиції, термін оплати. Settlepay згенерує чисте публічне посилання типу settlepay.pro/pay/inv_abc123 і надішле клієнту листом.'
        step3_title: 'Клієнт відкриває посилання'
        step3_body: 'Сторінка з твоєю назвою бізнесу, сумою в USD і списком підтримуваних мереж. Реєстрація не потрібна. KYC не потрібен.'
        step4_title: 'Клієнт під’єднує гаманець'
        step4_body: 'MetaMask, Coinbase Wallet, Rabby, WalletConnect — будь-який популярний гаманець. Він обирає мережу з найменшою комісією у себе на балансі й тисне «Оплатити».'
        step5_title: 'Наш слухач слідкує за блокчейном'
        step5_body: 'Демон на нашому сервері кожні кілька секунд опитує всі чотири мережі, шукаючи подію Transfer на твою адресу, що збігається з твоїм інвойсом. Перевіряє контракт токена за списком (USDC, USDT, DAI) і чекає достатньо підтверджень, щоб виключити реорг.'
        step6_title: 'Обидві сторони отримують квитанцію'
        step6_body: 'Статус інвойсу змінюється на «Оплачено» за 30 секунд після підтвердження. Клієнт отримує PDF-квитанцію поштою. Ти бачиш платіж у кабінеті. Гроші вже в твоєму гаманці — Settlepay їх не тримає.'

    why:
        eyebrow: 'Чому не Stripe'
        title: 'Ми не проти банків. Ми за фрилансерів.'
        sub: 'Stripe чудовий, якщо ти — бізнес у США, який виставляє інвойси клієнтам у США. Для решти це система дозволів, яку контролює хтось інший.'
        p1_title: 'Stripe не працює там, де живе більшість фрилансерів'
        p1_body: 'Приблизно половина країн із значним фриланс-населенням не може взагалі скористатися Stripe — Україна, Росія, Іран, Пакистан, В’єтнам, частини Латинської Америки й Африки. Ті ж самі країни, що породили перший бум віддаленої роботи.'
        p2_title: 'Ми беремо менше, бо й робимо менше'
        p2_body: 'Stripe бере 2,9% + $0,30, бо тримає гроші в кастоді, бореться з шахрайством, опрацьовує чарджбеки й мостить світові карткові мережі. Ми нічого з цього не робимо — ми тонкий шар сопоставлення поверх публічної інфраструктури. Тому наша комісія залишається 0,5–1%.'
        p3_title: 'Жодних чарджбеків'
        p3_body: 'Переказ стейблкоїнів стає остаточним у момент підтвердження. Ти ніколи не прокинешся з реверсом платежу через 90 днів, бо клієнт заявив про шахрайство. Платою за це є те, що суперечки вирішуються поза системою — як із готівкою.'
        p4_title: 'Твої гроші у твоєму гаманці, а не в нашому'
        p4_body: 'Коли виплата від Stripe йде 7 робочих днів до твого банку — твої гроші лежать у банку Stripe. Із Settlepay у момент підтвердження транзакції USDC опиняється в гаманці, яким керуєш лише ти. Ми буквально не можемо заморозити, затримати чи відкликати їх.'

    custody:
        title: 'Ми ніколи не тримаємо твої гроші.'
        body: 'Settlepay — це програмне забезпечення, а не платіжний оператор. Кожен платіж проходить напряму з гаманця клієнта в твій у публічному блокчейні — у нас немає кастоді, немає підписувального ключа, ми не маємо змоги заморозити кошти. Наша робота — зіставити on-chain подію Transfer із твоїм інвойсом і надіслати листи-підтвердження.'
        detail: 'Це найважливіше архітектурне рішення в продукті. Саме воно тримає нас поза регулюванням переказу грошей і дозволяє пообіцяти: ніщо, що зробимо ми — або з нами — не може завадити тобі отримати оплату.'

    who:
        eyebrow: 'Для кого це'
        title: 'Три групи, для яких ми це збудували.'
        p1_title: 'Соло-фрилансери з ринків, що розвиваються'
        p1_body: 'Дизайнери в Буенос-Айресі, розробники в Києві, копірайтери в Манілі, ілюстратори в Лагосі. Люди, які роблять роботу світового рівня для міжнародних клієнтів, поки локальний банкінг ставиться до кожного вхідного переказу як до справи про відмивання.'
        p2_title: 'Творці з Web3'
        p2_body: 'Дизайнери, розробники й автори контенту, які вже отримують оплату в крипті, але збирають усе з посилань Coinbase Commerce, окремих адрес гаманців і повідомлень у Telegram. Settlepay дає їм чисту, професійну обгортку у вигляді інвойсу.'
        p3_title: 'Невеликі агенції, що виставляють інвойси за кордон'
        p3_body: 'Студія з 3–10 людей в одній країні виставляє рахунки клієнтам у п’яти. Спільний воркспейс, спільні інвойси, кастомний брендинг, єдиний платіж за підписку — без того, щоб кожен учасник окремо переводив USDC у свій локальний банк.'

    cta:
        title: 'Готовий отримувати оплату по-сучасному?'
        sub: 'Безкоштовно до $1 000 виставлених інвойсів на місяць. Картка не потрібна. Налаштування займає менше хвилини — встав адресу гаманця й надішли перший інвойс.'
        button: 'Створити акаунт'

pricing:
    eyebrow: Тарифи
    title: 'Безкоштовно до $1 000. Копійки після.'
