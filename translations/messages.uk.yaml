    fees:
        title: 'Як працює комісія'
        body: 'На тарифі Free комісія — 1% з оплаченого рахунку, на Pro — 0,5%. Комісії накопичуються протягом місяця й списуються у фіаті з картки підписки 1-го числа — ми ніколи не вираховуємо їх із твоїх стейблкоїнів. Кошти завжди йдуть напряму від клієнта до твого гаманця.'
        fineprint: 'Без плати за підключення, без мінімального обороту, скасувати можна будь-коли.'
    faq:
        title: 'Часті запитання'
        q1: 'Чому комісія така низька порівняно з PayPal чи Stripe?'
        a1: 'PayPal і Stripe тримають усю глобальну платіжну інфраструктуру (карти, ACH, антифрод, чарджбеки) — звідси їхні відсотки. Settlepay цього не робить: клієнт платить тобі напряму зі свого гаманця, а розрахунок виконує блокчейн. Ми лише зіставляємо платежі з рахунками й повідомляємо тебе. Тож наші витрати — це сервер, листи й підтримка, що в середньому виходить близько 0,5% від суми рахунку.'
        q2: 'Чи треба знатися на крипті, щоб користуватися Settlepay?'
        a2: 'Ні. Налаштування займає 5 хвилин: реєстрація, вставка адреси гаманця (MetaMask, Coinbase Wallet тощо), створення першого рахунку. Клієнту теж не потрібен крипто-досвід — багато людей уже мають гаманець, бо хоч раз купували крипту.'
        q3: 'А якщо клієнт ніколи не користувався криптою?'
        a3: 'Надішли йому <a href="https://github.com/kindrakevich-agency/settlepay.pro/blob/main/docs/CRYPTO_BASICS.md" class="text-brand-600 hover:underline">наш 5-хвилинний посібник</a>. Або порадь купити USDC карткою через Coinbase, MoonPay чи Transak — перший раз триває 10 хвилин, потім миттєво.'
        q4: 'Які мережі підтримуються?'
        a4: 'Base, Polygon, Arbitrum та Optimism — найдешевші мережі L2, сумісні з Ethereum. Середня комісія за переказ — $0,01–0,05. Ethereum mainnet ми свідомо не підтримуємо: там одна транзакція коштує $5–20, що завелика плата для невеликих рахунків.'
        q5: 'Це легально? Чи потрібно перевіряти клієнтів через KYC?'
        a5: 'Settlepay — це програмний сервіс, а не платіжний оператор. Ми не зберігаємо коштів, клієнт платить тобі напряму, без посередників. Вимоги KYC залежать від податкового законодавства твоєї країни — так само, як для SWIFT-перекладу. Ми самі KYC не вимагаємо. Щодо звітності з крипто-доходу — звернися до місцевого бухгалтера.'
        q6: 'Як перевести в фіат?'
        a6: 'Ти отримуєш USDC на свій гаманець — той самий USDC можна вивести на банківський рахунок через Coinbase, Binance, Kraken, MoonPay або локальну біржу. Перший раз триває 1–3 дні (через KYC біржі), далі — хвилини. Або плати напряму карткою Coinbase Card чи Crypto.com Card.'
    cta:
        title: 'Готовий приймати оплату в стейблкоїнах?'

