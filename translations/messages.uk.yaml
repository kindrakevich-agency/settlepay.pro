help:
    title: 'Допомога'
    subtitle: 'Швидкі відповіді, гайд для старту й посилання на повну документацію.'
    quick:
        overview_title: 'Документація →'
        overview_sub: 'Огляд, REST API, довідник вебхуків.'
        api_title: 'REST API →'
        api_sub: 'Створюй, надсилай і скасовуй інвойси програмно.'
        webhooks_title: 'Вебхуки →'
        webhooks_sub: 'HMAC-підписані сповіщення про події інвойсів і платежів.'
    getting_started:
        title: 'Старт у 4 кроки'
        step1_title: 'Встанови гаманець для виплат.'
        step1_body: 'У Налаштуваннях → «Гаманець для отримання» встав адресу EVM-гаманця, куди прийматимеш стейблкоїни. Та сама адреса працює у Base, Polygon, Arbitrum і Optimism.'
        step1_link: 'Відкрити Налаштування →'
        step2_title: 'Створи перший інвойс.'
        step2_body: 'Додай імʼя клієнта, суму, опціонально позиції — обери мережі, у яких приймаєш оплату. Збережи як чернетку й надішли клієнту.'
        step2_link: 'Новий інвойс →'
        step3_title: 'Надішли посилання на оплату.'
        step3_body: 'Поділись посиланням через пошту, Telegram чи будь-який канал. Клієнт відкриє його, підключить гаманець і заплатить у USDC, USDT або DAI у тій мережі, яку ти прийняв.'
        step4_title: 'Отримуй оплату.'
        step4_body: 'Наш listener знаходить on-chain Transfer за 10–30 секунд, ставить статус «оплачено» та надсилає підтвердження обом сторонам. Кошти йдуть напряму з гаманця клієнта до тебе — Settlepay не торкається їх.'
    faq:
        title: 'Часті запитання'
        q1: 'Як працює комісія?'
        a1: 'Free: 1% з оплаченого інвойсу. Pro і Agency: 0,5%. Комісії накопичуються на твоєму <strong>робочому просторі</strong>, ми не списуємо їх із вхідних платежів — ті йдуть напряму у твій гаманець. Сплачуй накопичений баланс у USDC зі сторінки <a href="/uk/app/billing" class="text-brand-600 hover:underline">«Тариф»</a> коли тобі зручно. Без автоматичних списань. Без карток.'
        q2: 'Як оплачуються підписки?'
        a2: 'Pro — $19 USDC за 30 днів АБО $299 USDC довічно. Agency — $49 USDC за 30 днів (10 місць включено). Усе у USDC на наш платформенний гаманець — той самий listener, який матчить твої вхідні платежі, ловить і оплати підписки. Кожне поновлення — це окрема транзакція, яку підписуєш ти; жодних автоматичних списань.'
        q3: 'Як швидко підтверджується оплата?'
        a3: 'У L2-мережах транзакції зазвичай підтверджуються за 2–10 секунд. Ми чекаємо додаткові підтвердження перед тим, як ставити інвойсу статус <em>оплачено</em>: 5 у Base/Arbitrum/Optimism, 30 у Polygon (вищий ризик реоргу). Загалом — 10–60 секунд від платежу до сповіщення.'
        q4: 'А якщо клієнт ніколи не користувався криптою?'
        a4: 'Він може купити USDC карткою через Coinbase, MoonPay чи Transak — перший раз 10 хвилин, далі миттєво. Сама сторінка оплати — простий екран, який ховає вибір gas і мережі.'
        q5: 'Які мережі підтримуються?'
        a5: 'Base (8453), Polygon (137), Arbitrum (42161), Optimism (10). Усі — EVM L2 з дешевою комісією. Ethereum mainnet ми свідомо не підтримуємо — gas там задорого для рахунків розміру інвойсу.'
        q6: 'Які токени можна приймати?'
        a6: 'USDC, USDT і DAI у будь-якій із чотирьох мереж вище. На кожному інвойсі ти можеш обрати, які саме комбінації приймаєш.'
        q7: 'Як працюють API-токени й вебхуки?'
        a7: 'Pro і Agency мають програмний доступ. Створи токен у <a href="/uk/app/settings/api-tokens" class="text-brand-600 hover:underline">Налаштуваннях → API-токени</a> й викликай <code>/api/v1/invoices</code> та інші ендпоїнти. Зареєструй URL у <a href="/uk/app/settings/webhooks" class="text-brand-600 hover:underline">Налаштуваннях → Вебхуки</a> — ми POSTимо HMAC-підписаний JSON, коли інвойс надсилається, оплачується або скасовується. Повна документація у <a href="/uk/docs" class="text-brand-600 hover:underline">/docs</a>.'
        q8: 'Як влаштовано тариф Agency?'
        a8: 'Власник Agency може запросити до 9 колег по email. Усі учасники бачать ті самі інвойси, платежі, брендинг і тариф. Лише власник: налаштування виплат, тариф, брендинг, API-токени, вебхуки. Учасники: створюють, надсилають і скасовують свої інвойси.'
        q9: 'Як вивести кошти у фіат?'
        a9: 'Так. Ти отримуєш USDC у власний гаманець — той самий USDC можна вивести на банківський рахунок через Coinbase, Binance, Kraken, MoonPay чи локальні біржі. Перший раз 1–3 дні (KYC біржі), далі — хвилини.'
        q10: 'Чи це легально? Чи треба KYC клієнта?'
        a10: 'Settlepay — це програмне забезпечення, не платіжний оператор: ми не зберігаємо коштів. Клієнт платить тобі напряму, peer-to-peer. Вимоги KYC залежать від податкового законодавства твоєї країни (як і при отриманні SWIFT-платежу). Зі стейблкоїнами як доходом — порадься з бухгалтером.'
    troubleshooting:
        title: 'Розвʼязання типових проблем'
        sub: 'Найчастіші запитання щодо оплат.'
        q1: 'Клієнт оплатив, а інвойс досі у статусі «Надіслано».'
        a1: 'Зачекай 30–90 секунд, поки накопичуються підтвердження. Listener опитує мережу кожні 5–15 с; Polygon потребує 30 підтверджень (~1 хв), інші мережі — 5. Якщо статус не оновлюється понад 5 хвилин — перевір, що on-chain Transfer пішов саме на ту адресу, що вказана в інвойсі. Часткові або неправильно адресовані платежі зʼявляться у списку «Платежі» зі статусом «orphan».'
        q2: 'Гаманець каже «неправильна мережа».'
        a2: 'Гаманець клієнта зараз в іншій мережі, яку ти не приймаєш на цьому інвойсі. Він може переключитися або заплатити з іншої мережі, яку ти прийняв.'
        q3: 'Платіж у списку показано як «orphan».'
        a3: 'Transfer прийшов на твою адресу, але не співпав із жодним відкритим інвойсом (сума за межами ±0,5% толерантності, інвойс скасовано, або це faucet/тест). Кошти все одно твої — вони у твоєму гаманці — просто не привʼязалися до інвойсу автоматично.'
        q4: 'Лист підтвердження пошти не приходить.'
        a4: 'Перевір «Спам». Якщо за кілька хвилин не зʼявився — увійди й натисни «Надіслати лист знову» на банері кабінету. Outlook / Gmail іноді тримають нові домени-відправники на затримці кілька хвилин.'
        q5: 'Я на Free і впер у ліміт $1 000 на місяць.'
        a5: 'Free включає до $1 000 виставлених інвойсів за календарний місяць. Перейди на Pro ($19/міс) для безлімітного обсягу або зачекай до 1-го числа наступного місяця.'
    contact:
        title: 'Не допомогло?'
        body: 'Напиши на <a href="mailto:hello@settlepay.pro" class="text-brand-600 hover:underline">hello@settlepay.pro</a> — зазвичай відповідаємо протягом дня. Баги чи запити функцій — у GitHub issues.'
        email_button: 'Написати'
        github_button: 'GitHub issues'

