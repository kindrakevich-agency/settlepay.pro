        title: Без кастоді за замовчуванням
        body: 'Гроші йдуть напряму з гаманця клієнта в твій. Ми — це софт-шар, а не банк.'
    two:
        title: Підтвердження за секунди
        body: 'Дешеві L2 — і платіж підтверджується за 10–30 секунд, з комісією в копійки, а не 5% банку.'
