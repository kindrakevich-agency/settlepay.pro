seo:
    default_description: 'Settlepay — це сервіс для виставлення рахунків у стейблкоїнах із зручністю Stripe. Надсилай професійний інвойс і отримуй USDC у мережах Base, Polygon, Arbitrum чи Optimism. Гроші йдуть напряму до твого гаманця — без банків, без чекання.'
    home:
        title: 'Settlepay — оплата в стейблкоїнах для фрілансерів. Без банків.'
        description: 'Виставляй рахунки, отримуй USDC у найдешевших мережах L2 за 10–30 секунд. Ми не зберігаємо коштів — гроші йдуть напряму від клієнта до тебе. Комісія від 0,5%, без KYC для клієнтів.'
        keywords: 'оплата в крипті, інвойс у стейблкоїнах, оплата USDC, крипто-фріланс, отримати USDC, Base USDC, settlepay, рахунок для фрілансера'
        offer_description: 'Безкоштовно до $1 000 на місяць. Комісія 1% на тарифі Free, 0,5% на Pro.'

