privacy:
    title: Політика конфіденційності
    seo:
        title: 'Політика конфіденційності — Settlepay'
        description: 'Як Settlepay поводиться з твоїми даними: акаунт, інвойси, адреси гаманців. Non-custodial; ми не бачимо приватних ключів.'
    intro: 'Ця Політика пояснює, які дані Settlepay збирає, навіщо й як вони використовуються. Простою мовою.'
    s1_title: '1. Що ми збираємо'
    s1_body: 'Коли ти створюєш акаунт і користуєшся Settlepay, ми збираємо:'
    s1_item_account_t: 'Інформацію про акаунт'
    s1_item_account_d: 'Email, пароль (хешований через Argon2id; чистий пароль ніколи не зберігається), назву бізнесу, опційно — податковий ID та адресу, валюту й мову за замовчуванням.'
    s1_item_invoice_t: 'Зміст інвойсів'
    s1_item_invoice_d: 'Номер інвойсу, позиції, суми, ім’я та email клієнта, які ти ввів, термін оплати.'
    s1_item_wallet_t: 'Публічну адресу гаманця'
    s1_item_wallet_d: 'Адресу 0x..., яку ти задав як payout. Це публічні on-chain дані; ми ніколи не запитуємо й не бачимо твій приватний ключ.'
    s1_item_logs_t: 'Серверні логи'
    s1_item_logs_d: 'Стандартні web-логи (IP, user-agent, шлях запиту) для безпеки та боротьби зі спамом. Зберігаються 30 днів.'
    s2_title: '2. Чого ми НЕ збираємо'
    s2_body: 'Settlepay принципово НЕ збирає:'
    s2_item_1: '<strong>Твоїх приватних ключів.</strong> Ніколи. Settlepay non-custodial — твій гаманець підписує всі транзакції сам, у нас технічно немає доступу до твоїх коштів.'
    s2_item_2: '<strong>Документів KYC.</strong> Ні паспорта, ні ID, ні селфі. Ми — софт, не money-transmitter.'
    s2_item_3: '<strong>Особистих даних твоїх клієнтів понад те, що ти вказуєш в інвойсі.</strong> Клієнт платить через публічне посилання — ми не вимагаємо реєстрації або документів.'
    s3_title: '3. Сервіси третіх сторін'
    s3_body: 'Для роботи Settlepay ми використовуємо ці сервіси. У кожного власна політика конфіденційності:'
    s3_cloudflare: 'CDN + захист від DDoS. Бачить IP кожного відвідувача.'
    s3_resend: 'Вихідна пошта. Бачить email-адреси й вміст листів.'
    s3_hetzner: 'Хостинг сервера. Зберігає всі дані БД зашифрованими.'
    s3_rpc: 'Читає on-chain Transfer-події для виявлення платежів. Ми не передаємо їм твою адресу — фільтруємо логи за адресою токена.'
    s3_walletconnect: 'З’єднання мобільних гаманців через QR. Бачить, який гаманець підключається, але не зміст оплати.'
    s3_chain_t: 'Сам блокчейн'
    s3_chain_d: 'За визначенням публічний. Будь-хто бачить, хто кому скільки заплатив. Ми до цього нічого не додаємо.'
    s4_title: '4. Як ми використовуємо твої дані'
    s4_body: 'Виключно для надання сервісу: рендер кабінету, надсилання листів про інвойси та квитанції, виявлення on-chain платежів і їхнє зіставлення з інвойсами. Ми не продаємо, не здаємо в оренду й не ділимося даними з рекламодавцями. Ми не запускаємо аналітику, що стежить за тобою на інших сайтах.'
    s5_title: '5. Твої права'
    s5_body: 'Ти можеш:'
    s5_item_1: 'Експортувати всі дані акаунту на запит (профіль, інвойси, платежі).'
    s5_item_2: 'Видалити акаунт назавжди — записи про оплачені інвойси ми зберігаємо 7 років для податкового аудиту (анонімно), але видаляємо твою PII.'
    s5_item_3: 'Виправити будь-які дані самому в /app/settings.'
    s5_item_4: 'Звернутися до нас з будь-яким питанням приватності.'
    s5_contact: 'Для всього вищого — пиши на <a href="mailto:hello@settlepay.pro">hello@settlepay.pro</a>.'
    s6_title: '6. Cookies'
    s6_body: 'Ми використовуємо лише одну cookie: сесійну, щоб тримати тебе залогіненим. Жодного трекінгу, жодної реклами, жодних cross-site cookies.'
    s7_title: '7. Діти'
    s7_body: 'Settlepay призначений для користувачів від 18 років. Ми свідомо не збираємо даних дітей.'
    s8_title: '8. Зміни цієї політики'
    s8_body: 'Коли політика змінюється, ми оновлюємо дату й надсилаємо листа всім активним акаунтам. На істотні зміни — 30 днів попередження.'

terms:
    title: Умови надання послуг
    seo:
        title: 'Умови — Settlepay'
        description: 'Умови надання Settlepay. Софт-фасилітатор, не money-transmitter. Non-custodial. Використовуєш на свій ризик.'
    intro: 'Ці Умови регулюють користування Settlepay. Створюючи акаунт, ти погоджуєшся з ними.'
    s1_title: '1. Що таке Settlepay'
    s1_body: 'Settlepay — це <strong>програмний сервіс</strong>, який допомагає фрілансерам і малим бізнесам надсилати професійні інвойси й отримувати оплату в стейблкоїнах (USDC, USDT, DAI) у EVM-сумісних блокчейнах. Settlepay <strong>НЕ є</strong> money transmitter, кастодіаном, банком, біржею або брокером. Ми не зберігаємо, не переказуємо й не маємо доступу до коштів користувачів. Кошти йдуть напряму з гаманця клієнта в твій через публічний блокчейн.'
    s2_title: '2. Хто може користуватися'
    s2_body: 'Ти повинен:'
    s2_item_1: 'Бути віком 18+.'
    s2_item_2: 'Не бути в санкційних списках (OFAC SDN, EU consolidated, ООН тощо).'
    s2_item_3: 'Мати право користуватися софтом такого роду за законами країни проживання.'
    s3_title: '3. Твої обов’язки'
    s3_body: 'Ти сам відповідаєш за: збереження облікових даних, безпеку приватного ключа гаманця (у нас немає доступу й ми не можемо відновити), декларування й сплату податків з отриманого доходу, легальність твоєї діяльності за місцевим законодавством, точність інформації в інвойсах.'
    s4_title: '4. Реалії on-chain'
    s4_body: 'Криптовалютні транзакції <strong>незворотні</strong>. Щойно платіж підтверджено в блокчейні, ні Settlepay, ні третя сторона не можуть скасувати, повернути або відновити його. Зокрема:'
    s4_item_1: 'Якщо ти вкажеш не ту адресу як payout — кошти, надіслані туди, втрачені. Не з нашої вини, а через незмінність блокчейну.'
    s4_item_2: 'Якщо клієнт надішле не ту суму — це між тобою і ним. Settlepay фіксує розбіжність, але не вирішує суперечок.'
    s4_item_3: 'Якщо гаманець клієнта зламано і хтось інший оплачує твій інвойс — оплата зараховується інвойсу; крадіжку розв’язує клієнт із правоохоронцями.'
    s4_item_4: 'Якщо емітент стейблкоїна (наприклад Circle для USDC) заблокує гаманець — кошти будуть недоступні до розблокування. Settlepay на це не впливає.'
    s5_title: '5. Комісії'
    s5_body: 'Free: 1% з оплаченого інвойсу. Pro: $19/міс + 0,5% з оплаченого інвойсу. Agency: $49/міс + 0,5%. Комісії накопичуються протягом місяця, списуються у фіаті через Stripe із твоєї підписки 1-го числа наступного місяця. Ми ніколи не вираховуємо комісії з твоїх стейблкоїнів — вони приходять до тебе недоторканими.'
    s6_title: '6. Допустиме використання'
    s6_body: 'Ти погоджуєшся не використовувати Settlepay для: незаконної діяльності (шахрайство, відмивання коштів, фінансування тероризму); прийому оплати за заборонені у твоїй юрисдикції товари або послуги; переслідування, наклепу або зловживань через зміст інвойсу; надсилання інвойсів клієнтам, які не погоджувалися на платіж; спроб зламати або реверс-інженерити сервіс.'
    s7_title: '7. Припинення'
    s7_body: 'Будь-яка зі сторін може припинити співпрацю в будь-який момент. Ми можемо призупинити або видалити твій акаунт, якщо ти порушиш Умови, не сплатиш накопичені комісії або потрапиш у санкційні списки. Припинення не скасовує вже накопичених комісій. Дані можна експортувати протягом 30 днів після припинення, потім вони видаляються (з урахуванням законних вимог щодо зберігання).'
    s8_title: '8. Відмова від гарантій'
    s8_body: 'Settlepay надається «як є», без гарантій будь-якого роду. Ми не гарантуємо безперервної роботи, відсутності багів, або що конкретний блокчейн чи стейблкоїн продовжуватиме функціонувати. Ми робимо все, що можемо, але інфраструктура поза нашим контролем.'
    s9_title: '9. Обмеження відповідальності'
    s9_body: 'У межах, дозволених законом, сукупна відповідальність Settlepay обмежена меншою з двох сум: (a) комісій, які ти сплатив за останні 12 місяців до моменту претензії, або (b) $100. Ми не несемо відповідальності за збитки через перевантаження мережі блокчейну, проблеми RPC-провайдерів, де-пег стейблкоїнів, баги в смарт-контрактах токенів, заблоковані емітентом кошти, дії третіх сторін.'

