        a4: 'Ніяк. Комісія накопичується на одному балансі робочого простору, і власник сплачує її у USDC. Внутрішній облік (чий інвойс) — на твоїй стороні; на кожному інвойсі є `created_by` для атрибуції.'
        q5: 'Чи можу видалити колегу?'
        a5: 'Так — власник тисне «Видалити» у Налаштуваннях → Команда. Колега миттєво втрачає доступ до кабінету. Створені ним інвойси залишаються в робочому просторі (атрибуція через created_by зберігається).'
        q6: 'Що буде, якщо скасувати?'
        a6: 'Мʼяке скасування: команда зберігає доступ до Agency до кінця поточного 30-денного періоду, потім тариф падає на Free. Учасники понад ліміт Free (1) автоматично деактивуються, якщо ти не поновиш. Дані не видаляються — поновиш і повернеться.'
