        body: 'Гроші йдуть напряму з гаманця клієнта до твого. Ми лише програмний шар — не банк, не кастодіан.'
    two:
        title: Підтвердження за секунди
        body: 'Дешеві L2-мережі: платіж проходить за 10–30 секунд із комісією в копійки замість 5% банківських.'
    three:
