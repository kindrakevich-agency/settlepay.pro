features:
    eyebrow: Створено для фрілансерів
    title: 'UX рівня Stripe — на рейках, які тобі потрібні.'
    sub: 'Клієнт платить з будь-якого гаманця. Ти отримуєш стейблкоїни на свій гаманець, у мережі на твій вибір. Ми ніколи не торкаємося грошей.'
