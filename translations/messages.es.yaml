agency:
    seo:
        title: 'Settlepay para agencias — facturación cripto compartida'
        description: 'Invita hasta 10 compañeros a un espacio compartido. Facturación en stablecoins con facturación controlada por el Owner, marca personalizada y una sola comisión consolidada. $49 USDC cada 30 días, 0,5% por factura cobrada.'
    eyebrow: 'Plan Agency'
    hero:
        title: 'Facturación cripto para todo el estudio.'
        sub: 'Un espacio compartido donde 10 compañeros envían facturas, cobran en stablecoins y todo se consolida en un plan gestionado por el Owner. El Owner controla facturación y marca; los miembros se centran en el trabajo.'
        cta_primary: 'Iniciar Agency — $49 en USDC'
        cta_secondary: 'Cómo funciona'
        trust: 'Sin custodia · 0,5% por factura · 10 plazas · Cancela cuando quieras'
    how:
        eyebrow: 'Cómo funciona'
        title: 'Un espacio. Diez plazas. Cero hojas de cálculo.'
        sub: 'El Owner pasa a Agency, invita a sus compañeros por correo, y desde ese momento cada factura que cualquiera envíe vive en el mismo pool. Se acabó perseguir PDFs por Slack.'
        step1_title: 'Tú actualizas el espacio.'
        step1_body: 'Pagas $49 en USDC. El plan pasa a Agency, el límite de plazas sube a 10. Misma billetera, mismo listener — solo un flag distinto en la BD.'
        step2_title: 'Invitas por email.'
        step2_body: 'Ajustes → Equipo → su correo. Reciben un enlace firmado válido 14 días. Se registran con ese mismo correo y ya están dentro.'
        step3_title: 'Todos facturan desde un solo pool.'
        step3_body: 'Cualquier miembro puede crear y enviar facturas. Todos los pagos llegan a la billetera del espacio. Las comisiones se acumulan en un saldo único que el Owner liquida en USDC.'
    features:
        eyebrow: 'Para trabajar en equipo'
        title: 'Controles de estudio sin precio de estudio.'
        f1_title: 'Roles que importan de verdad'
        f1_body: 'El Owner controla facturación, cobro, marca, tokens de API y webhooks. Los miembros pueden crear, enviar y anular sus propias facturas. Un miembro no va a tocar la billetera por accidente.'
        f2_title: 'Una billetera, un saldo'
        f2_body: 'Todas las facturas del espacio apuntan a la misma dirección. Las comisiones se acumulan en el espacio, no por persona. Un solo botón de liquidación.'
        f3_title: 'Marca en todas las superficies'
        f3_body: 'Sube un logo, elige un color de acento. Se aplica a la página de pago, los recibos PDF y los correos — automáticamente, para cada factura que cualquiera del equipo envíe.'
        f4_title: 'Webhooks + REST API'
        f4_body: 'Conecta Slack, contabilidad, dashboards a medida. Los tokens son del espacio, así que la integración ve los mismos datos que el equipo — sin casos especiales.'
        f5_title: 'Sin custodia, como siempre'
        f5_body: 'Los fondos van directos de las billeteras de tus clientes a la del espacio. Nunca tocamos el dinero — Owner o miembro ven el mismo rastro on-chain.'
        f6_title: 'Cancelación suave, sin sorpresas'
        f6_body: 'Cancela cuando quieras desde Facturación. El acceso a Agency dura hasta el final del periodo. Sin reembolsos prorrateados, sin renovaciones automáticas. Pagas cuando tú quieres.'
    pricing:
        badge: 'Incluye 10 plazas'
        name: 'Agency · $49 USDC cada 30 días'
        tagline: 'Para estudios y equipos pequeños'
        feat_1: '10 plazas incluidas'
        feat_2: '0,5% por factura cobrada'
        feat_3: 'Volumen ilimitado'
        feat_4: 'Marca personalizada (logo + color)'
        feat_5: 'Webhooks + API REST'
        feat_6: 'Recibos PDF en 3 idiomas'
        disclaimer: 'Pago en USDC a la billetera de Settlepay. Sin tarjetas, sin Stripe, sin débito automático. Cada renovación es un pago nuevo que tú autorizas.'
        cta: 'Pasar — $49 en USDC'
    faq:
        title: 'Preguntas sobre Agency'
        q1: '¿Cuántas plazas tengo?'
        a1: '10 plazas en total — el Owner más 9 compañeros invitados. Suficiente para un estudio de 1–10 personas. Sin coste por plaza extra.'
        q2: '¿Un miembro ve las facturas de los demás?'
        a2: 'Sí. Cada miembro del espacio ve todas las facturas, pagos y logs de webhooks. Agency es para equipos que YA confían entre ellos para compartir un pool financiero.'
        q3: '¿Qué NO puede hacer un miembro?'
        a3: 'No puede cambiar facturación, cobro, marca, tokens de API ni webhooks. Sí puede crear, enviar y anular sus propias facturas. El Owner controla la billetera y el plan.'
        q4: '¿Cómo se reparten las comisiones entre compañeros?'
        a4: 'No se reparten. Las comisiones se acumulan en el saldo único del espacio y el Owner las liquida en USDC. La asignación interna (qué factura es de quién) la haces tú — cada factura guarda `created_by` para atribución.'
        q5: '¿Puedo quitar a un compañero?'
        a5: 'Sí — el Owner pulsa Quitar en Ajustes → Equipo. Pierde acceso al panel al instante. Las facturas que creó siguen en el espacio (la atribución created_by se mantiene).'
        q6: '¿Qué pasa si cancelo?'
        a6: 'Cancelación suave: el equipo conserva acceso Agency hasta el final del periodo de 30 días, después pasa a Free. Los miembros por encima del límite Free (1) se desactivan automáticamente si no renuevas. No se borran datos — renueva y vuelven.'
    cta:
        title: '¿Listo para meter al estudio?'
        sub: 'Actualiza una vez. Invita al equipo. Todo lo demás sigue exactamente igual.'
        primary: 'Pasar a Agency'
        secondary: 'Comparar todos los planes'
