help:
    title: 'Ayuda'
    subtitle: 'Respuestas rápidas, guía de inicio y enlace a la documentación completa.'
    quick:
        overview_title: 'Documentación →'
        overview_sub: 'Resumen, API REST y referencia de webhooks.'
        api_title: 'API REST →'
        api_sub: 'Crea, envía y anula facturas programáticamente.'
        webhooks_title: 'Webhooks →'
        webhooks_sub: 'Callbacks firmados con HMAC para eventos de facturas y pagos.'
    getting_started:
        title: 'Empezar en 4 pasos'
        step1_title: 'Configura tu billetera de cobro.'
        step1_body: 'En Ajustes → Cobro, pega la dirección EVM donde quieres recibir stablecoins. La misma dirección funciona en Base, Polygon, Arbitrum y Optimism.'
        step1_link: 'Abrir Ajustes →'
        step2_title: 'Crea tu primera factura.'
        step2_body: 'Añade nombre de cliente, importe, líneas opcionales y las redes que aceptas. Guárdala como borrador y envíala al cliente.'
        step2_link: 'Nueva factura →'
        step3_title: 'Envía el enlace de pago.'
        step3_body: 'Comparte el enlace por email, Telegram o donde quieras. Tu cliente lo abre, conecta su billetera y paga en USDC, USDT o DAI en la red que acepte.'
        step4_title: 'Cobra.'
        step4_body: 'Nuestro listener detecta el Transfer on-chain en 10–30 segundos, marca la factura como pagada y notifica a ambas partes. Los fondos van directos de la billetera del cliente a la tuya — Settlepay nunca los toca.'
    faq:
        title: 'Preguntas frecuentes'
        q1: '¿Cómo funcionan las comisiones?'
        a1: 'Free: 1% por factura cobrada. Pro y Agency: 0,5%. Las comisiones se acumulan en tu <strong>espacio de trabajo</strong>, no se descuentan de los pagos entrantes — esos van directo a tu billetera. Liquidas el saldo acumulado en USDC desde la página de <a href="/es/app/billing" class="text-brand-600 hover:underline">Facturación</a> cuando quieras. Sin débito automático. Sin tarjetas.'
        q2: '¿Cómo se pagan las suscripciones?'
        a2: 'Pro: $19 USDC cada 30 días O $299 USDC de por vida. Agency: $49 USDC cada 30 días (10 plazas). Todo en USDC a nuestra billetera — el mismo listener que empareja tus pagos de facturas también empareja los de suscripción. Cada renovación es una transacción nueva que tú autorizas; sin débitos automáticos.'
        q3: '¿En cuánto se confirma un pago?'
        a3: 'Las transacciones en L2 suelen confirmarse en 2–10 s. Esperamos confirmaciones adicionales antes de marcar la factura como <em>pagada</em>: 5 en Base/Arbitrum/Optimism, 30 en Polygon (más riesgo de reorg). En total: 10–60 segundos del pago a la notificación.'
        q4: '¿Y si mi cliente nunca usó cripto?'
        a4: 'Puede comprar USDC con tarjeta vía Coinbase, MoonPay o Transak — 10 minutos la primera vez, instantáneo después. La página de pago es un solo paso que abstrae gas y selección de red.'
        q5: '¿Qué redes admiten?'
        a5: 'Base (8453), Polygon (137), Arbitrum (42161) y Optimism (10). Las cuatro son L2 EVM con gas barato. Ethereum mainnet no se admite deliberadamente — el gas es demasiado caro para facturas pequeñas.'
        q6: '¿Qué tokens puedo aceptar?'
        a6: 'USDC, USDT y DAI en cualquiera de las cuatro redes. Eliges por factura las combinaciones que aceptas.'
        q7: '¿Cómo funcionan los tokens de API y los webhooks?'
        a7: 'Pro y Agency tienen acceso programático. Genera un token en <a href="/es/app/settings/api-tokens" class="text-brand-600 hover:underline">Ajustes → Tokens de API</a> y llama a <code>/api/v1/invoices</code>, etc. Registra endpoints en <a href="/es/app/settings/webhooks" class="text-brand-600 hover:underline">Ajustes → Webhooks</a> — enviamos JSON firmado con HMAC cuando las facturas se envían, pagan o anulan. Referencia completa en <a href="/es/docs" class="text-brand-600 hover:underline">/docs</a>.'
        q8: '¿Cómo funciona el plan Agency?'
        a8: 'El Owner de Agency puede invitar hasta 9 compañeros por correo. Todos los miembros comparten facturas, pagos, marca y facturación. Solo el Owner: ajustes de cobro, cambios de plan, marca, tokens de API y webhooks. Los miembros: crean, envían y anulan sus propias facturas.'
        q9: '¿Puedo convertir a fiat?'
        a9: 'Sí. Recibes USDC en tu billetera — el mismo USDC puedes pasarlo a una cuenta bancaria vía Coinbase, Binance, Kraken, MoonPay o exchanges locales. La primera vez 1–3 días (KYC del exchange), después minutos.'
        q10: '¿Es legal? ¿Tengo que hacer KYC a mis clientes?'
        a10: 'Settlepay es software, no operador de pagos — nunca custodiamos fondos. Tu cliente te paga directamente, peer-to-peer. Los requisitos de KYC dependen de la ley fiscal de tu país (igual que recibir un SWIFT). Consulta con un contable local sobre tributación de ingresos en stablecoins.'
    troubleshooting:
        title: 'Solución de problemas'
        sub: 'Casos comunes al cobrar.'
        q1: 'Mi cliente pagó pero la factura sigue en "Enviada".'
        a1: 'Espera 30–90 segundos a las confirmaciones. El listener consulta cada 5–15 s; Polygon necesita 30 confirmaciones (~1 min), las demás redes 5. Si tras 5 minutos no se actualiza, verifica que el Transfer on-chain fue a la dirección exacta de la factura. Pagos parciales o a dirección incorrecta aparecerán como "orphan" en Pagos.'
        q2: 'La billetera dice "red incorrecta".'
        a2: 'La billetera del cliente está en una red que no aceptaste en esta factura. Puede cambiar de red o pagar desde otra red que sí hayas aceptado.'
        q3: 'Un pago aparece como "orphan" en la lista de Pagos.'
        a3: 'El Transfer on-chain llegó a tu billetera pero no coincidió con ninguna factura abierta (importe fuera de la tolerancia ±0,5%, factura anulada, o fue un faucet/test). Los fondos siguen siendo tuyos — están en tu billetera — solo que no se enlazaron automáticamente.'
        q4: 'No llega el correo de verificación.'
        a4: 'Revisa spam. Si pasan unos minutos sin nada, inicia sesión y pulsa "Reenviar verificación" en el banner del panel. Outlook/Gmail a veces retienen dominios remitentes nuevos durante unos minutos.'
        q5: 'Estoy en Free y llegué al tope de $1.000 al mes.'
        a5: 'Free incluye hasta $1.000 facturados por mes calendario. Pásate a Pro ($19/mes) para volumen ilimitado o espera al día 1 del mes siguiente.'
    contact:
        title: '¿Sigues atascado?'
        body: 'Escríbenos a <a href="mailto:hello@settlepay.pro" class="text-brand-600 hover:underline">hello@settlepay.pro</a> — solemos responder en un día. Bugs y peticiones de features: abre un issue en GitHub.'
        email_button: 'Escríbenos'
        github_button: 'GitHub issues'

