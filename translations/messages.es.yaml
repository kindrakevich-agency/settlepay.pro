        feat_4: 'Lista de clientes compartida'
        feat_5: 'Llamada de onboarding + soporte dedicado'
        cta: Avísame
    fees:
        title: 'Cómo funcionan las comisiones'
        body: 'En Free la comisión es del 1% por factura cobrada; en Pro, del 0,5%. Las comisiones se acumulan durante el mes y se cobran en fiat a tu tarjeta de suscripción el día 1 (nunca las descontamos de tus stablecoins). Todo no custodial — los fondos van directos del cliente a tu billetera.'
        fineprint: 'Sin coste de alta, sin mínimo, cancela cuando quieras.'
    faq:
        title: 'Preguntas frecuentes'
        q1: '¿Por qué la comisión es tan baja comparada con PayPal o Stripe?'
        a1: 'PayPal y Stripe operan infraestructura de pago global (tarjetas, ACH, antifraude, contracargos). Settlepay no hace nada de eso — tu cliente paga desde su billetera cripto a la tuya, y la blockchain liquida la operación. Nosotros solo emparejamos pagos con facturas y te avisamos. La mayor parte de nuestros costes son servidor, email y soporte — a escala pequeña, ~0,5% de la factura promedio.'
        q2: '¿Necesito conocimientos de cripto?'
        a2: 'No. Configurar lleva 5 minutos: registrarse, pegar la dirección de tu billetera (de MetaMask, Coinbase Wallet, etc.), enviar tu primera factura. Tu cliente tampoco necesita ser experto — muchos ya tienen una billetera.'
        q3: '¿Y si mi cliente nunca ha usado cripto?'
        a3: 'Envíale <a href="https://github.com/kindrakevich-agency/settlepay.pro/blob/main/docs/CRYPTO_BASICS.md" class="text-brand-600 hover:underline">nuestra guía de 5 minutos</a>. O que compre USDC con tarjeta vía Coinbase / MoonPay / Transak — la primera vez tarda 10 minutos, después es instantáneo.'
        q4: '¿Qué redes soportáis?'
        a4: 'Base, Polygon, Arbitrum, Optimism — las cuatro L2 EVM más baratas. El gas medio por pago es $0,01-0,05. No soportamos Ethereum mainnet a propósito porque ahí el gas es demasiado caro para facturas pequeñas ($5-20 por tx).'
        q5: '¿Es legal? ¿Tengo que hacer KYC a mis clientes?'
        a5: 'Settlepay es software, no money transmitter — nunca custodiamos fondos. Tu cliente te paga directamente, peer-to-peer. Los requisitos KYC dependen de la fiscalidad de tu país (igual que recibir pagos por SWIFT). Nosotros no exigimos KYC. Consulta con un asesor fiscal local sobre la declaración de ingresos en stablecoins.'
        q6: '¿Cómo paso a fiat?'
        a6: 'Recibes USDC en tu billetera — el mismo USDC que puedes pasar a tu banco vía Coinbase, Binance, Kraken, MoonPay o exchanges locales. La primera vez tarda 1-3 días (KYC), luego son minutos. O salta el off-ramp y paga directamente con una tarjeta Coinbase Card / Crypto.com Card.'
    cta:
        title: '¿Listo para cobrar en stablecoins?'

