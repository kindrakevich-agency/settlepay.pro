    eyebrow: Precios
    title: 'Gratis hasta $1.000. Centavos después.'
    sub: 'Empieza gratis, sin tarjeta. Pasa al plan pago solo cuando tu volumen de facturación lo justifique.'
    popular: Más popular
    seo:
        title: 'Precios de Settlepay — desde $0 al mes'
        description: 'Gratis hasta $1.000 facturados al mes (1% por factura cobrada). Pro $19/mes con 0,5% y volumen ilimitado. Agency para estudios pequeños.'
    tier_free:
        name: Free
        tagline: Para primeras facturas y proyectos personales
        fee: '1% por factura cobrada'
        feat_1: 'Hasta $1.000 facturados al mes'
