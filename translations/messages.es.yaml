        tagline: Para estudios y equipos pequeños
        fee: '0,5% por factura cobrada'
        feat_1: 'Todo lo del plan Pro'
        feat_2: 'Hasta 5 plazas en el equipo'
        feat_3: 'Paneles de facturación por cliente'
        feat_4: 'Lista de clientes compartida'
        feat_5: 'Llamada de onboarding + soporte dedicado'
        cta: Avísame
    fees:
        title: 'Cómo funcionan las comisiones'
        body: 'En Free la comisión es del 1% por factura cobrada; en Pro, del 0,5%. Las comisiones se acumulan durante el mes y se cobran en fiat a la tarjeta de tu suscripción el día 1 del mes siguiente. Nunca las descontamos de los stablecoins que recibes — esos llegan a tu billetera completos, directo del cliente.'
        fineprint: 'Sin coste de alta, sin mínimo, puedes cancelar cuando quieras.'
    faq:
        title: 'Preguntas frecuentes'
        q1: '¿Por qué la comisión es tan baja comparada con PayPal o Stripe?'
        a1: 'PayPal y Stripe sostienen toda la infraestructura de pagos global (tarjetas, ACH, antifraude, contracargos), y eso es lo que cobran. Settlepay no hace nada de eso: tu cliente paga directamente desde su billetera cripto a la tuya y la blockchain liquida la operación. Nosotros solo emparejamos los pagos con las facturas y te avisamos. Por eso nuestros costes son servidor, correo y soporte — alrededor del 0,5% del importe medio de una factura.'
        q2: '¿Necesito saber de cripto para usar Settlepay?'
        a2: 'No. Configurarlo lleva 5 minutos: regístrate, pega la dirección de tu billetera (MetaMask, Coinbase Wallet, etc.) y envía tu primera factura. Tu cliente tampoco necesita ser experto: hoy casi todos tienen una billetera porque alguna vez compraron cripto.'
        q3: '¿Y si mi cliente nunca usó cripto?'
        a3: 'Mándale <a href="https://github.com/kindrakevich-agency/settlepay.pro/blob/main/docs/CRYPTO_BASICS.md" class="text-brand-600 hover:underline">nuestra guía de 5 minutos</a>. O que compre USDC con tarjeta a través de Coinbase, MoonPay o Transak — la primera vez tarda unos 10 minutos, después es instantáneo.'
        q4: '¿Qué redes son compatibles?'
        a4: 'Base, Polygon, Arbitrum y Optimism — las cuatro redes L2 más baratas y compatibles con Ethereum. La comisión de red por pago es de $0,01–0,05. No usamos Ethereum mainnet a propósito: ahí cada transacción cuesta $5–20, demasiado para facturas pequeñas.'
        q5: '¿Es legal? ¿Tengo que pedir KYC a mis clientes?'
        a5: 'Settlepay es un servicio de software, no un operador de pagos. Nunca custodiamos fondos: tu cliente te paga directamente. Las obligaciones de KYC dependen de la legislación fiscal de tu país (igual que cuando recibes una transferencia SWIFT). Nosotros no exigimos KYC. Para declarar ingresos en stablecoins consulta con un contador local.'
        q6: '¿Cómo paso a moneda local?'
        a6: 'Recibes USDC en tu billetera — el mismo USDC que después puedes transferir a tu cuenta bancaria a través de Coinbase, Binance, Kraken, MoonPay o tu exchange local. La primera vez tarda 1–3 días (por el KYC del exchange), luego son minutos. O paga directo con una tarjeta Coinbase Card o Crypto.com Card.'
    cta:
        title: '¿Listo para cobrar en stablecoins?'

