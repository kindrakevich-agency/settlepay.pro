seo:
    default_description: 'Settlepay es la forma con UX de Stripe para facturar en stablecoins. Envía una factura profesional y cobra en USDC en Base, Polygon, Arbitrum u Optimism — sin custodia, sin bancos, sin esperas.'
    home:
        title: 'Settlepay — cobra en stablecoins. Sin bancos. Sin esperas.'
        description: 'Manda facturas y cobra en USDC en las L2 más baratas. No custodial, comisiones desde 0,5%, sin KYC para clientes. Hecho para freelancers en Argentina, México, Colombia, Nigeria y más.'
