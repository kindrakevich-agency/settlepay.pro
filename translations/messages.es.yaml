privacy:
    title: Política de privacidad
    seo:
        title: 'Política de privacidad de Settlepay'
        description: 'Cómo trata Settlepay tus datos: cuenta, facturas, direcciones de billetera. Nunca custodiamos fondos ni vemos claves privadas.'
    intro: 'Esta Política explica, en lenguaje claro, qué datos recogemos en Settlepay, para qué los usamos y cómo los protegemos.'
    s1_title: '1. Qué recogemos'
    s1_body: 'Cuando creas una cuenta y usas Settlepay, recogemos:'
    s1_item_account_t: 'Datos de cuenta'
    s1_item_account_d: 'Tu correo, contraseña (almacenada con hash Argon2id; nunca guardamos el texto plano), nombre del negocio y, de forma opcional, tu ID fiscal, dirección, moneda e idioma por defecto.'
    s1_item_invoice_t: 'Contenido de las facturas'
    s1_item_invoice_d: 'Número de factura, líneas, importes, el nombre y correo del cliente que tú escribes y la fecha de vencimiento.'
    s1_item_wallet_t: 'Dirección pública de billetera'
    s1_item_wallet_d: 'La dirección 0x... que configuras como destino de cobro. Es información pública dentro del blockchain; nunca pedimos ni vemos tu clave privada.'
    s1_item_logs_t: 'Logs del servidor'
    s1_item_logs_d: 'Logs estándar de acceso web (IP, user agent, ruta) para seguridad y prevención de abuso. Se conservan durante 30 días.'
    s2_title: '2. Qué NO recogemos'
    s2_body: 'Settlepay deliberadamente NO recoge:'
    s2_item_1: '<strong>Tus claves privadas.</strong> Nunca. Settlepay no custodia fondos — tu billetera firma todas las transacciones por sí misma y nosotros no tenemos forma técnica de acceder a tu dinero.'
    s2_item_2: '<strong>Documentos KYC.</strong> Ni pasaporte, ni DNI, ni selfies. Somos un servicio de software, no un operador de pagos.'
    s2_item_3: '<strong>Datos personales de tus clientes más allá de lo que tú pones en la factura.</strong> El cliente paga a través de un enlace público — no le pedimos que se registre ni que entregue identificación.'
    s3_title: '3. Servicios de terceros'
    s3_body: 'Para operar Settlepay usamos estos proveedores. Cada uno tiene su propia política de privacidad:'
    s3_cloudflare: 'CDN y protección DDoS. Ve la IP de cada visitante.'
    s3_resend: 'Correo saliente. Ve direcciones de correo y contenido de los mensajes.'
    s3_hetzner: 'Alojamiento del servidor. Guarda toda la base de datos cifrada en reposo.'
    s3_rpc: 'Lee eventos Transfer en el blockchain para detectar pagos. Nunca le enviamos tu dirección de billetera; filtramos los logs por la dirección del contrato del token.'
    s3_walletconnect: 'Conecta billeteras móviles por código QR. Ve qué billetera se conecta, pero no el contenido del pago.'
    s3_chain_t: 'La propia blockchain'
    s3_chain_d: 'Es pública por definición: cualquiera puede ver quién pagó a quién y cuánto. Nosotros no añadimos información encima de eso.'
    s4_title: '4. Cómo usamos tus datos'
    s4_body: 'Únicamente para prestar el servicio: mostrar tu panel, enviar correos con facturas y recibos, detectar pagos en el blockchain y emparejarlos con tus facturas. No vendemos, alquilamos ni compartimos tus datos con anunciantes. No usamos analítica que te siga por otros sitios.'
    s5_title: '5. Tus derechos'
    s5_body: 'Puedes:'
    s5_item_1: 'Exportar todos los datos de tu cuenta cuando lo pidas (perfil, facturas, pagos).'
    s5_item_2: 'Eliminar tu cuenta de forma permanente. Conservamos los registros de facturas pagadas durante 7 años por motivos fiscales (ya anonimizados), pero borramos tus datos personales.'
    s5_item_3: 'Corregir tú mismo cualquier dato visible en /app/settings.'
    s5_item_4: 'Escribirnos con cualquier duda de privacidad.'
    s5_contact: 'Para todo lo anterior, escríbenos a <a href="mailto:hello@settlepay.pro">hello@settlepay.pro</a>.'
    s6_title: '6. Cookies'
    s6_body: 'Usamos una sola cookie: la de sesión, para mantenerte conectado. No hay seguimiento publicitario ni cookies de terceros sitios.'
    s7_title: '7. Menores'
    s7_body: 'Settlepay está pensado para mayores de 18 años. No recogemos datos de menores de forma consciente.'
    s8_title: '8. Cambios en esta política'
    s8_body: 'Cuando cambiemos esta política, actualizaremos la fecha de «Última actualización» y avisaremos por correo a todas las cuentas activas. Los cambios materiales se anuncian con 30 días de antelación.'

terms:
    title: Términos del servicio
    seo:
        title: 'Términos del servicio de Settlepay'
        description: 'Settlepay es un servicio de software, no un operador de pagos. No custodiamos fondos. Los pagos en blockchain son irreversibles. Lo usas bajo tu propio riesgo.'
    intro: 'Estos Términos regulan el uso de Settlepay. Al crear una cuenta, los aceptas.'
    s1_title: '1. Qué es Settlepay'
    s1_body: 'Settlepay es un <strong>servicio de software</strong> que ayuda a freelancers y pequeñas empresas a enviar facturas profesionales y recibir pagos en stablecoins (USDC, USDT, DAI) en redes compatibles con Ethereum. Settlepay <strong>NO es</strong> un operador de pagos, custodio, banco, exchange ni bróker. No mantenemos, transferimos ni tenemos ningún acceso a los fondos de los usuarios. Los fondos viajan directos de la billetera del cliente a la tuya a través del blockchain público.'
    s2_title: '2. Quién puede usarlo'
    s2_body: 'Debes:'
    s2_item_1: 'Tener al menos 18 años.'
    s2_item_2: 'No figurar en ninguna lista de sanciones (OFAC SDN, lista consolidada de la UE, ONU, etc.).'
    s2_item_3: 'Tener permitido usar un servicio como Settlepay según la legislación de tu país de residencia.'
    s3_title: '3. Tus responsabilidades'
    s3_body: 'Eres el único responsable de: mantener seguras tus credenciales; cuidar la clave privada de tu billetera (no tenemos acceso y no podemos recuperarla); declarar y pagar los impuestos sobre los ingresos que recibes; cumplir la legalidad de tu actividad según tu jurisdicción local; y la veracidad de toda la información que escribes en las facturas que envías.'
    s4_title: '4. La realidad del blockchain'
    s4_body: 'Las transacciones en criptomoneda son <strong>irreversibles</strong>. Una vez confirmado un pago en el blockchain, ni Settlepay ni nadie más puede revertirlo, reembolsarlo ni recuperarlo. En particular:'
    s4_item_1: 'Si configuras la dirección equivocada como destino de cobro, los pagos enviados a esa dirección se pierden — no por culpa nuestra, sino por la naturaleza inmutable del blockchain.'
    s4_item_2: 'Si tu cliente envía un importe incorrecto, eso es entre tú y él. Settlepay registra la diferencia pero no resuelve disputas.'
    s4_item_3: 'Si la billetera del cliente fue comprometida y otra persona paga tu factura, el pago igual se acredita. La resolución del robo es entre el cliente y las autoridades.'
    s4_item_4: 'Si el emisor de un stablecoin (por ejemplo, Circle para USDC) congela una billetera, esos fondos quedan inaccesibles hasta que el emisor los libere. Settlepay no tiene ninguna influencia sobre eso.'
    s5_title: '5. Comisiones'
    s5_body: 'Plan Free: 1% por factura cobrada. Plan Pro: $19 al mes + 0,5%. Plan Agency: $49 al mes + 0,5%. Las comisiones se acumulan durante el mes y se cobran en fiat a través de Stripe a la tarjeta de tu suscripción el día 1 del mes siguiente. Nunca descontamos comisiones de los stablecoins que recibes — esos llegan a tu billetera completos.'
    s6_title: '6. Uso aceptable'
    s6_body: 'Aceptas no usar Settlepay para: actividades ilegales (fraude, blanqueo de capitales, financiación del terrorismo); cobrar por bienes o servicios prohibidos en tu jurisdicción; acoso, difamación o abuso a través del contenido de las facturas; enviar facturas a clientes que no han aceptado ser facturados; o cualquier intento de interrumpir el servicio o aplicarle ingeniería inversa.'
    s7_title: '7. Fin del servicio'
    s7_body: 'Cualquiera de las partes puede dar por terminado el acuerdo en cualquier momento. Podemos suspender o cerrar tu cuenta si incumples estos Términos, dejas de pagar comisiones acumuladas o apareces en una lista de sanciones. La terminación no anula comisiones ya devengadas. Los datos se pueden exportar durante 30 días después del cierre; pasado ese plazo se eliminan (respetando los requisitos legales de retención).'
    s8_title: '8. Renuncia de garantías'
    s8_body: 'Settlepay se ofrece «tal cual», sin garantía de ningún tipo. No garantizamos servicio ininterrumpido, ausencia de errores ni que una red blockchain o stablecoin específica seguirá funcionando. Hacemos todo lo que está en nuestras manos, pero la infraestructura subyacente está fuera de nuestro control.'
    s9_title: '9. Límite de responsabilidad'
    s9_body: 'En la medida máxima que permita la ley, la responsabilidad total de Settlepay se limita a la menor de estas dos cantidades: (a) las comisiones que nos pagaste en los 12 meses anteriores a la reclamación, o (b) $100. No somos responsables de pérdidas derivadas de la congestión de la red blockchain, caídas del proveedor RPC, eventos de pérdida de paridad de un stablecoin, bugs en los smart contracts del token, fondos congelados por el emisor del token o cualquier acción de terceros.'

