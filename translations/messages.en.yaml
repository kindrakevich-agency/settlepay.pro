    eyebrow: Pricing
    title: 'Free for the first $1,000. Pennies after.'
    sub: 'Start free, no card required. Upgrade only when your invoicing volume justifies it.'
    popular: Most popular
    seo:
        title: 'Settlepay pricing — from $0/month'
        description: 'Free up to $1,000 invoiced per month (1% per paid invoice). Pro at $19/month with 0.5% fee and unlimited volume. Agency for small studios.'
    tier_free:
