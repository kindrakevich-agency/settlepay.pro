        title: 'REST API reference'
        subtitle: 'Versioned at /api/v1. JSON in, JSON out. Money is always two fields: amount_cents (integer) + currency (ISO 4217).'
        auth_title: 'Authentication'
        auth_body: 'Send your token as a Bearer header. Tokens are minted in the dashboard at /app/settings/api-tokens and shown ONCE.'
        envelope_title: 'Response envelope'
        envelope_body: 'Every response is either a `data` envelope or an `error` envelope. Errors carry a stable string code so you can switch on it.'
        endpoints_title: 'Endpoints'
