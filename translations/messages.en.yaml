features:
    eyebrow: Built for freelancers
    title: 'Stripe-grade UX, on the rails you actually want.'
    sub: 'Clients pay from any wallet. You get stablecoins in your wallet, on the L2 of your choice. We never touch the money.'
    one:
        title: Non-custodial by design
        body: "Funds move directly from your client's wallet to yours. We're the software layer, never the bank."
    two:
        title: Confirmed in seconds
        body: 'Cheap L2s mean payments confirm in 10–30 seconds, with fees of pennies — not 5% bank charges.'
    three:
        title: Receipts that look like Stripe's
        body: 'Branded PDFs, hosted invoice pages, automatic payment confirmation emails in three languages.'

