    eyebrow: Pricing
    title: 'Free for the first $1,000. Pennies after.'
    sub: 'Start free, no card required. Upgrade only when your invoicing volume justifies it.'
    popular: Most popular
    seo:
        title: 'Pricing — Settlepay'
        description: 'Free up to $1,000/month invoiced (1% fee). Pro at $19/month with 0.5% fee and unlimited volume. Agency for teams.'
    tier_free:
        name: Free
        tagline: For first invoices and side projects
        fee: '1% per paid invoice'
        feat_1: 'Up to $1,000 invoiced per month'
        feat_2: 'USDC, USDT, DAI on 4 chains'
