        title: 'Webhooks'
        subtitle: 'Settlepay POSTs a JSON event to your URL whenever something interesting happens. Each request is signed so you can verify it’s really us.'
        events_title: 'Events'
        event_invoice_sent: 'Fired when you mark a draft as sent (or call /send).'
        event_invoice_paid: 'Fired when the on-chain listener confirms a matching payment.'
        event_invoice_voided: 'Fired when an invoice is voided.'
        event_payment_received: 'Fired alongside `invoice.paid` — useful if you also care about partial payments or want raw on-chain detail.'
