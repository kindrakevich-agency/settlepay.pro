        retries_2xx: '2xx responses — delivered, never retried.'
        retries_410: '410 Gone — endpoint disabled permanently, no more deliveries.'
        retries_4xx: 'Other 4xx — treated as a client error, not retried.'
        retries_5xx: '5xx / 408 / 429 / network timeout — retried.'

