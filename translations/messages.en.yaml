        request_shape_body: 'JSON body, three signing-related headers, one delivery id for idempotency on your side.'
        verify_title: 'Verifying the signature'
        verify_body: 'Compute `HMAC-SHA256(timestamp + "." + body, secret)` and compare in constant time. Same scheme as Stripe.'
