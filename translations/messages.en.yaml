        cta: Start free
    tier_pro:
        name: Pro
        tagline: For active freelancers
        fee: '0.5% per paid invoice'
        feat_1: 'Everything in Free'
        feat_2: 'Unlimited invoicing volume'
        feat_3: 'Custom branding on payment page + emails'
        feat_4: 'Webhooks + API access'
        feat_5: 'PDF receipts'
        feat_6: 'Priority support'
        cta: Upgrade to Pro
    tier_agency:
        name: Agency
        badge: Coming soon
        tagline: For studios + small teams
        fee: '0.5% per paid invoice'
        feat_1: 'Everything in Pro'
        feat_2: 'Up to 5 team seats'
        feat_3: 'Per-client billing dashboards'
        feat_4: 'Shared client list'
        feat_5: 'Onboarding call + dedicated support'
        cta: Get notified
    fees:
        title: 'How fees work'
        body: 'Free has a 1% fee per paid invoice; Pro has 0.5%. Fees accumulate during the month and we bill them in fiat to your subscription card on the 1st (we never deduct from your stablecoin payments). All non-custodial — funds always go from client wallet to your wallet directly.'
        fineprint: 'No setup fee, no minimum, cancel anytime.'
    faq:
        title: 'Frequently asked'
        q1: 'Why is the fee so low compared to PayPal / Stripe?'
        a1: 'PayPal and Stripe operate global payment infrastructure (cards, ACH, fraud prevention, chargebacks). Settlepay does none of that — your client pays from their crypto wallet to yours, with the blockchain settling the transaction. We just track which payments correspond to which invoices and notify you. Most of our cost is server, email, and support — at small scale that''s ~0.5% of average invoice value.'
        q2: 'Do I need crypto knowledge to use Settlepay?'
        a2: 'No. Setting up takes 5 minutes: register, paste your wallet address (from MetaMask, Coinbase Wallet, etc.), send your first invoice. Your client also doesn''t need to be a crypto expert — most of them already have a wallet from buying a coffee with their phone.'
        q3: 'What if my client has never used crypto before?'
        a3: 'Send them <a href="https://github.com/kindrakevich-agency/settlepay.pro/blob/main/docs/CRYPTO_BASICS.md" class="text-brand-600 hover:underline">our 5-minute beginner guide</a>. Or have them buy USDC directly with a card via Coinbase / MoonPay / Transak — takes 10 minutes the first time, instant after.'
        q4: 'Which networks do you support?'
        a4: 'Base, Polygon, Arbitrum, Optimism — the four cheapest EVM L2s. Average gas per payment is $0.01-0.05. We deliberately don''t support Ethereum mainnet because gas there is too expensive for invoice-size payments ($5-20 per tx).'
        q5: 'Is this legal? Do I need to KYC my clients?'
        a5: 'Settlepay is software, not a money transmitter — we never custody funds. Your client pays you directly, peer-to-peer. KYC requirements depend on your country''s tax law (the same as receiving payment via SWIFT). We don''t require any KYC ourselves. Consult a local accountant for tax reporting on stablecoin income.'
        q6: 'How do I get my money out as fiat?'
        a6: 'You receive USDC in your wallet — that''s the same USDC you can off-ramp to your bank account via Coinbase, Binance, Kraken, MoonPay, or local exchanges in your country. Most off-ramps take 1-3 days for the first transfer (KYC) and minutes after. Or skip the off-ramp and pay things directly with a Coinbase Card / Crypto.com Card.'
    cta:
        title: 'Ready to get paid in stablecoins?'

