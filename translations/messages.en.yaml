        ep_me_patch: 'Update profile / payout address.'
        ep_invoices_list: 'List your invoices. Cursor-paginated.'
        ep_invoices_create: 'Create a new invoice (Idempotency-Key supported).'
        ep_invoices_get: 'Fetch a single invoice by UUID.'
        ep_invoices_patch: 'Edit a draft invoice. Only drafts.'
        ep_invoices_delete: 'Delete a draft invoice. Only drafts.'
        ep_invoices_send: 'Move from draft → sent and email the client.'
        ep_invoices_void: 'Void an unpaid invoice.'
        ep_payments_list: 'List on-chain payments matched to your invoices.'
        ep_payments_get: 'Fetch a single payment by id.'
        example_title: 'Example: create + send'
        example_body: 'Two calls — one to create the draft, one to send it. Or pass `?send=1` to the POST.'
