name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Serialize prod deploys — never two concurrent SSH sessions racing the
# same /www/wwwroot/settlepay.pro working tree.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  php:
    name: PHP — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, bcmath, gmp, intl, mbstring, redis, opcache, zip
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock', 'composer.json') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint YAML
        run: php bin/console lint:yaml config translations --parse-tags

      - name: Lint Twig
        run: php bin/console lint:twig templates

      - name: Lint container
        env:
          APP_ENV: test
          APP_SECRET: ci_test_secret_not_real
          DATABASE_URL: 'mysql://test:test@127.0.0.1:3306/test?serverVersion=10.11.6-MariaDB'
          REDIS_URL: 'redis://127.0.0.1:6379'
          MESSENGER_TRANSPORT_DSN: 'doctrine://default?auto_setup=0'
          MAILER_DSN: 'null://null'
        run: php bin/console lint:container

      - name: PHPUnit
        if: hashFiles('phpunit.xml.dist', 'phpunit.xml', 'tests/') != ''
        env:
          APP_ENV: test
          APP_SECRET: ci_test_secret_not_real
          DATABASE_URL: 'mysql://test:test@127.0.0.1:3306/test?serverVersion=10.11.6-MariaDB'
          REDIS_URL: 'redis://127.0.0.1:6379'
        run: vendor/bin/phpunit --testdox || echo "(no tests yet)"

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Build assets
        run: pnpm build

  deploy:
    name: Deploy to production
    # Only deploy after lint/typecheck/build all pass, on direct pushes to
    # main (not PRs — those just need CI to gate the merge).
    needs: [php, frontend]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            PHP=/www/server/php/83/bin/php
            COMPOSER=/usr/local/bin/composer
            APP_DIR=/www/wwwroot/settlepay.pro

            echo "=== Pull latest code ==="
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "=== Strip dev-only files from production checkout ==="
            rm -f compose.yaml docker-compose.yml docker-compose.*.yml Makefile 2>/dev/null || true
            rm -rf docker/ 2>/dev/null || true

            echo "=== Backend: composer install ==="
            $PHP $COMPOSER install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "=== Backend: cache:clear + warmup ==="
            rm -rf var/cache/prod
            APP_ENV=prod $PHP bin/console cache:clear --no-warmup
            APP_ENV=prod $PHP bin/console cache:warmup
            chown -R www:www var/

            echo "=== Backend: migrations ==="
            APP_ENV=prod $PHP bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

            echo "=== Frontend: install + build assets ==="
            corepack enable
            corepack prepare pnpm@9.12.0 --activate
            pnpm install --frozen-lockfile
            pnpm build

            echo "=== Permissions ==="
            chown -R www:www public/build var/ 2>/dev/null || true

            echo "=== Restart PHP-FPM (clear opcache) ==="
            /etc/init.d/php-fpm-83 restart

            echo "=== Restart background units (mainnet listener + worker) ==="
            # Mainnet listener only. The testnet listener (settle-listener-testnet.service)
            # is intentionally NOT restarted here — it's disabled on prod (2026-05-13) to
            # conserve Alchemy free-tier compute units. Re-enable via
            # `systemctl enable --now settle-listener-testnet.service` if you ever need it.
            systemctl restart settle-listener.service 2>/dev/null || echo "(listener unit not yet installed)"
            systemctl restart settle-worker@1 2>/dev/null || echo "(worker unit not yet installed)"

            echo "=== Deploy complete ==="
