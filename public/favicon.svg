<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#2dd4bf"/>
            <stop offset="55%"  stop-color="#14b8a6"/>
            <stop offset="100%" stop-color="#0d9488"/>
        </linearGradient>
    </defs>
    <!-- Teal badge — kept because browsers need a colored fill to find the icon in tabs. -->
    <rect x="0" y="0" width="32" height="32" rx="9" fill="url(#g)"/>

    <!-- Flowing S — matches the brand mark in templates/_logo.html.twig. -->
    <path d="M 22 8
             C 22 7 21 6.5 20 6.5
             L 13 6.5
             C 9.5 6.5 7 9 7 12.5
             C 7 15.5 9.5 17 12.5 17
             L 19 17
             C 22 17 24.5 18.5 24.5 21.5
             C 24.5 23.5 23 25.5 21 25.5
             L 9 25.5"
          stroke="#ffffff" stroke-width="2.6"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Coin termini -->
    <circle cx="22" cy="8" r="2" fill="#ffffff"/>
    <circle cx="9" cy="25.5" r="2" fill="#ffffff"/>
</svg>
